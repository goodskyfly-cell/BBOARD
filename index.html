<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>籃球戰術平台 Pro - 最終精確版</title>
    <style>
        body { margin: 0; padding: 0; background-color: #1a202c; font-family: sans-serif; height: 100vh; overflow: hidden; color: white; }
        
        /* 側邊戰術庫 - 隱藏抽屜 */
        .sidebar { 
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%; 
            background: #2d3748; z-index: 3000; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; flex-direction: column; padding: 20px; box-sizing: border-box;
            border-right: 3px solid #4a5568; box-shadow: 10px 0 15px rgba(0,0,0,0.3);
        }
        .sidebar.active { left: 0; }
        .sidebar-toggle { 
            position: fixed; left: 15px; top: 15px; z-index: 3100; 
            background: rgba(49, 130, 206, 0.9); border: none; color: white; 
            padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        /* 畫布區域極大化 */
        .main-content { width: 100vw; height: 100vh; display: flex; flex-direction: column; position: relative; }
        .canvas-area { flex: 1; display: flex; justify-content: center; align-items: center; background: #1a202c; padding: 5px; }
        canvas { background-color: #f39c12; cursor: grab; touch-action: none; border-radius: 4px; }

        /* 底部語音框 - 常駐於最下方 */
        .voice-bar { 
            background: #2d3748; height: 60px; display: flex; justify-content: center; 
            align-items: center; border-top: 1px solid #4a5568; z-index: 1000;
        }
        .voice-input-display { width: 90%; background: #1a202c; padding: 10px 20px; border-radius: 30px; color: #718096; }

        /* 隱藏的功能按鈕區 - 位於語音框上方，懸浮隱藏 */
        .hidden-controls { 
            position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; background: rgba(0,0,0,0.7); padding: 10px 20px; 
            border-radius: 15px; z-index: 2000; opacity: 0; transition: 0.3s; pointer-events: none;
        }
        /* 當滑鼠靠近底部或語音框時顯示按鈕 */
        .main-content:hover .hidden-controls, .hidden-controls:hover { opacity: 1; pointer-events: auto; }

        button { border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; padding: 10px 18px; }
        .btn-orange { background: #d69e2e; }
        .btn-green { background: #38a169; }
        .btn-red { background: #e53e3e; }
        .btn-blue { background: #3182ce; }
        .btn-gray { background: #4a5568; }
    </style>
</head>
<body>

<button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('active')">☰ 戰術選單</button>

<div class="sidebar" id="sidebar">
    <h3 style="margin-top: 50px;">📁 戰術儲存庫</h3>
    <div style="flex:1; background:#1a202c; border-radius:8px; margin-bottom:15px; padding:10px; border:1px solid #4a5568;">
        <p style="text-align:center; color:#718096; margin-top:20px;">尚無戰術紀錄</p>
    </div>
    <button class="btn-blue" style="width:100%; padding:15px;">💾 儲存戰術 (Save)</button>
</div>

<div class="main-content">
    <div class="canvas-area" id="canvas-wrap">
        <canvas id="courtCanvas"></canvas>
    </div>

    <div class="hidden-controls">
        <button class="btn-orange" id="mark-btn">📌 紀錄點位</button>
        <button class="btn-green" id="play-btn">▶️ 播放動畫</button>
        <button class="btn-red" id="stop-btn">⏹️ 停止</button>
        <button class="btn-gray" id="reset-btn">🔄 重置位置</button>
        <button class="btn-blue" id="full-btn">📺 全螢幕</button>
    </div>

    <div class="voice-bar">
        <div class="voice-input-display">🎤 正在聆聽指令... (繁體中文)</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('courtCanvas');
    const ctx = canvas.getContext('2d');
    const wrap = document.getElementById('canvas-wrap');

    // 標準畫布比例 (FIBA 規格參考)
    const BASE_W = 940, BASE_H = 640;
    let items = [], images = [], scaleRatio = 1, dragTarget = null;

    const imgNames = ["01.png", "05.png", "06.png", "07.png", "08.png", "09.png", "10.png", "12.png", "13.png", "15.png", "23.png", "89.png"];
    const imgUrls = imgNames.map(name => `https://raw.githubusercontent.com/goodskyfly-cell/newboard/main/${name}`);

    async function init() {
        images = await Promise.all(imgUrls.map(url => new Promise(res => {
            const img = new Image(); img.crossOrigin = "anonymous"; img.src = url;
            img.onload = () => res(img); img.onerror = () => res(null);
        })));
        resetPlayers();
        window.addEventListener('resize', render);
        render();
    }

    function resetPlayers() {
        items = [];
        // 將球員置於球場底部邊緣外
        images.forEach((img, i) => { if(img) items.push({ x: 60 + i * 75, y: 610, img: img, type: 'player' }); });
        items.push({ x: 470, y: 300, type: 'ball' });
    }

    // --- 關鍵修正：準確還原原始線條幾何 ---
    function drawCourtLines(s) {
        ctx.save();
        ctx.strokeStyle = "rgba(255, 255, 255, 0.95)";
        ctx.lineWidth = 2.5 * s;
        ctx.lineCap = "round";

        const pad = 20 * s;
        const cw = 900 * s;  // 球場內寬
        const ch = 560 * s;  // 球場內高
        const midX = 470 * s;
        const midY = 300 * s;

        // 1. 球場大框
        ctx.strokeRect(pad, pad, cw, ch);

        // 2. 中線與中圈
        ctx.beginPath();
        ctx.moveTo(midX, pad);
        ctx.lineTo(midX, pad + ch);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.arc(midX, midY, 60 * s, 0, Math.PI * 2);
        ctx.stroke();

        // 3. 禁區與三分線 (左右鏡射)
        [true, false].forEach(isLeft => {
            const sideX = isLeft ? pad : pad + cw;
            const dir = isLeft ? 1 : -1;

            // 禁區 (192 x 220 比例)
            const keyW = 190 * s;
            const keyH = 220 * s;
            ctx.strokeRect(isLeft ? pad : pad + cw - keyW, midY - (keyH / 2), keyW, keyH);

            // 三分線弧度 (恢復 238px 精確半徑)
            ctx.beginPath();
            // 起始於底線平行處
            ctx.moveTo(sideX, midY - 238 * s);
            ctx.arc(sideX + dir * 60 * s, midY, 238 * s, (isLeft ? -1.25 : 1.9), (isLeft ? 1.25 : 4.38));
            ctx.stroke();

            // 籃下圓圈 (參考點)
            ctx.beginPath();
            ctx.arc(sideX + dir * 55 * s, midY, 12 * s, 0, Math.PI * 2);
            ctx.stroke();
        });
        ctx.restore();
    }

    function render() {
        // 確保畫布在目前視窗內最大化
        const winW = wrap.clientWidth - 10;
        const winH = wrap.clientHeight - 10;
        scaleRatio = Math.min(winW / BASE_W, winH / BASE_H);
        
        canvas.width = BASE_W * scaleRatio;
        canvas.height = BASE_H * scaleRatio;

        // 背景
        ctx.fillStyle = "#f39c12";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        drawCourtLines(scaleRatio);

        // 繪製球員
        const radius = 25 * scaleRatio;
        items.forEach(p => {
            const dx = p.x * scaleRatio, dy = p.y * scaleRatio;
            ctx.save();
            if(p.type === 'ball') {
                ctx.beginPath(); ctx.arc(dx, dy, radius * 0.6, 0, Math.PI * 2);
                ctx.fillStyle = "#ff4500"; ctx.fill(); ctx.strokeStyle = "black"; ctx.stroke();
            } else {
                ctx.beginPath(); ctx.arc(dx, dy, radius, 0, Math.PI * 2);
                ctx.fillStyle = "white"; ctx.fill(); ctx.clip();
                if(p.img) ctx.drawImage(p.img, dx - radius, dy - radius, radius * 2, radius * 2);
                ctx.restore();
                ctx.beginPath(); ctx.arc(dx, dy, radius, 0, Math.PI * 2);
                ctx.strokeStyle = "#333"; ctx.lineWidth = 2 * scaleRatio; ctx.stroke();
            }
            ctx.restore();
        });
    }

    // 交互邏輯
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const ev = e.touches ? e.touches[0] : e;
        return { x: (ev.clientX - rect.left) / scaleRatio, y: (ev.clientY - rect.top) / scaleRatio };
    }

    canvas.addEventListener('mousedown', e => {
        const p = getPos(e);
        dragTarget = items.findLast(i => Math.hypot(i.x - p.x, i.y - p.y) < 30);
    });
    window.addEventListener('mousemove', e => {
        if(!dragTarget) return;
        const p = getPos(e);
        dragTarget.x = p.x; dragTarget.y = p.y;
        render();
    });
    window.addEventListener('mouseup', () => dragTarget = null);

    document.getElementById('full-btn').onclick = () => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    };
    document.getElementById('reset-btn').onclick = () => { resetPlayers(); render(); };

    init();
</script>
</body>
</html>
