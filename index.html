<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>籃球戰術平台 Pro - 語音強化版</title>
    <style>
        :root { --accent: #3182ce; --bg: #000000; --panel: rgba(20, 20, 20, 0.95); --border: rgba(255,255,255,0.1); }
        body { margin: 0; padding: 0; background-color: var(--bg); overflow: hidden; height: 100vh; display: flex; font-family: -apple-system, sans-serif; color: white; }
        
        .stage { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; z-index: 1; background: #000; }
        .stage.ios-full-mode { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; }
        canvas { background-color: #111; touch-action: none; cursor: crosshair; z-index: 5; }

        /* 強化版語音欄位 */
        .voice-bar { 
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%);
            z-index: 1000; cursor: move; pointer-events: auto; 
            background: var(--panel); backdrop-filter: blur(15px); padding: 15px 20px; 
            border-radius: 16px; border: 2px solid rgba(255,255,255,0.2); 
            display: flex; gap: 12px; align-items: center; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); width: 90%; max-width: 600px;
        }
        .voice-btn { 
            background: #805ad5; border: none; border-radius: 10px; color: white; 
            padding: 12px 20px; cursor: pointer; font-weight: bold; font-size: 18px; 
            white-space: nowrap; transition: 0.3s;
        }
        .voice-btn.active { background: #f56565; animation: pulse 1.5s infinite; box-shadow: 0 0 15px rgba(245,101,101,0.6); }
        
        /* 加大顯示字體 */
        input#v-output { 
            flex: 1; background: #1a202c; border: 1px solid #4a5568; 
            color: #f6e05e; padding: 12px 15px; border-radius: 8px; 
            outline: none; font-size: 22px; font-weight: bold; /* 字體顯著加大 */
        }

        /* 側邊欄與控制列 (維持先前優化) */
        .sidebar { position: absolute; top: 0; height: 100%; background: var(--panel); transition: 0.3s; z-index: 900; display: flex; flex-direction: column; }
        .sidebar-left { left: -260px; width: 260px; border-right: 1px solid var(--border); }
        .sidebar-left.active { left: 0; }
        .sidebar-right { right: -200px; width: 200px; border-left: 1px solid var(--border); padding: 20px 15px; box-sizing: border-box; gap: 12px; }
        .sidebar-right.active { right: 0; }
        .tab { position: absolute; width: 35px; height: 100px; display: flex; align-items: center; justify-content: center; writing-mode: vertical-lr; cursor: pointer; font-size: 12px; font-weight: bold; z-index: 901; }
        .left-tab { right: -35px; top: 120px; background: #3182ce; border-radius: 0 8px 8px 0; }
        .right-tab { left: -35px; top: 120px; background: #38a169; border-radius: 8px 0 0 8px; }

        .play-controls {
            position: absolute; bottom: -100px; left: 50%; transform: translateX(-50%);
            z-index: 1100; transition: 0.4s; background: var(--panel); 
            padding: 15px 30px; border-radius: 25px; display: flex; gap: 20px;
        }
        .play-controls.active { bottom: 40px; }
        .control-btn { border: none; border-radius: 50%; width: 55px; height: 55px; cursor: pointer; font-size: 24px; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="stage" id="mainStage">
    <div class="play-controls" id="playUI">
        <button class="control-btn" style="background:#38a169;color:white;" onclick="resumeAnim()">▶</button>
        <button class="control-btn" style="background:#ecc94b;color:white;" onclick="pauseAnim()">Ⅱ</button>
        <button class="control-btn" style="background:#e53e3e;color:white;" onclick="stopAnim()">■</button>
    </div>

    <div class="voice-bar" id="dragVoice">
        <button class="voice-btn" id="v-toggle" onclick="toggleVoice()">🎤 開始說話</button>
        <input type="text" id="v-output" placeholder="辨識結果將顯示於此..." readonly>
        <button style="background:#4a5568; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer;" onclick="document.getElementById('v-output').value=''">重設</button>
    </div>

    <div class="sidebar sidebar-left" id="sidebarL">
        <div class="tab left-tab" onclick="toggleSidebar('L')">📁 戰術庫 ◀</div>
        <div style="padding: 20px 15px;">🏀 紀錄點位：<span id="saveCount">0</span></div>
        <div class="tactic-list" id="tacticList" style="flex:1; overflow-y:auto; padding:10px;"></div>
    </div>

    <div class="sidebar sidebar-right" id="sidebarR">
        <div class="tab right-tab" onclick="toggleSidebar('R')">⚙️ 面板 ◀</div>
        <button style="width:100%; padding:12px; background:#38a169; color:white; border:none; border-radius:8px; margin-bottom:8px;" onclick="record()">📌 紀錄點位</button>
        <button style="width:100%; padding:12px; background:#3182ce; color:white; border:none; border-radius:8px; margin-bottom:8px;" onclick="startPlayProcess()">▶ 播放動畫</button>
        <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:10px 0;">
        <button style="width:100%; padding:12px; background:#4a5568; color:white; border:none; border-radius:8px;" onclick="resetItems()">🔄 重置球員</button>
        <button style="width:100%; padding:12px; background:#e53e3e; color:white; border:none; border-radius:8px; margin-top:8px;" onclick="clearFrames()">🗑️ 清空紀錄</button>
    </div>

    <canvas id="court"></canvas>
</div>

<script>
    const canvas = document.getElementById('court');
    const ctx = canvas.getContext('2d');
    const BASE_W = 1000, BASE_H = 572; 
    let items = [], frames = [], playerImages = [], courtImage = null;
    let isPlaying = false, isPaused = false, stopRequested = false;
    let currentFrameIdx = 0, currentT = 0;

    // --- 語音功能修正區 ---
    let recognition = null;
    let isListening = false;

    function initVoice() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            document.getElementById('v-output').value = "您的瀏覽器不支援語音辨識";
            return;
        }

        recognition = new SpeechRecognition();
        recognition.lang = 'zh-TW';
        recognition.continuous = true;
        recognition.interimResults = true;

        recognition.onstart = () => {
            isListening = true;
            updateVoiceUI(true);
        };

        recognition.onresult = (event) => {
            let transcript = "";
            for (let i = event.resultIndex; i < event.results.length; i++) {
                transcript += event.results[i][0].transcript;
            }
            document.getElementById('v-output').value = transcript;
        };

        recognition.onerror = (event) => {
            console.error("語音錯誤:", event.error);
            if (event.error === 'not-allowed') {
                alert("請允許麥克風權限以使用語音功能");
                isListening = false;
                updateVoiceUI(false);
            }
        };

        recognition.onend = () => {
            // 如果是在開啟狀態下自動停止（例如長久沉默），則自動重啟
            if (isListening) recognition.start();
        };
    }

    function toggleVoice() {
        if (!recognition) initVoice();
        if (!recognition) return;

        if (!isListening) {
            try {
                recognition.start();
            } catch (e) { console.error(e); }
        } else {
            isListening = false;
            recognition.stop();
            updateVoiceUI(false);
        }
    }

    function updateVoiceUI(active) {
        const btn = document.getElementById('v-toggle');
        if (active) {
            btn.innerText = "🛑 停止辨識";
            btn.classList.add('active');
        } else {
            btn.innerText = "🎤 開始說話";
            btn.classList.remove('active');
        }
    }

    // --- 動畫與介面邏輯 (承襲前版本優化) ---
    function startPlayProcess() {
        if(frames.length < 2) return alert("請紀錄至少兩組點位");
        document.getElementById('sidebarR').classList.remove('active');
        document.getElementById('playUI').classList.add('active');
        currentFrameIdx = 0; currentT = 0; stopRequested = false;
        resumeAnim();
    }

    function pauseAnim() { isPaused = true; isPlaying = false; }
    function stopAnim() { 
        stopRequested = true; isPlaying = false; isPaused = false; 
        document.getElementById('playUI').classList.remove('active');
        render(); 
    }

    function resumeAnim() {
        if(isPlaying) return;
        isPlaying = true; isPaused = false;
        requestAnimationFrame(animLoop);
    }

    function animLoop() {
        if(!isPlaying || stopRequested) return;
        render(currentT, frames[currentFrameIdx], frames[currentFrameIdx + 1]);
        currentT += 0.02; 
        if (currentT >= 1) { currentT = 0; currentFrameIdx++; }
        if (currentFrameIdx >= frames.length - 1) { stopAnim(); return; }
        requestAnimationFrame(animLoop);
    }

    function render(t=null, sF=null, eF=null) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if(courtImage) ctx.drawImage(courtImage, 0, 0, canvas.width, canvas.height);
        const s = canvas.width / BASE_W;
        let data = (t !== null && sF && eF) ? sF.map((it, i) => ({
            ...it, x: it.x + (eF[i].x - it.x) * t, y: it.y + (eF[i].y - it.y) * t
        })) : items;

        data.forEach(p => {
            const r = (p.type==='ball' ? 18 : 34) * s;
            const px = p.x * s, py = p.y * s;
            ctx.save();
            ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2);
            if(p.type === 'ball') {
                ctx.fillStyle = "#ff5722"; ctx.fill(); ctx.strokeStyle = "white"; ctx.lineWidth = 2*s; ctx.stroke();
            } else {
                ctx.fillStyle = "white"; ctx.fill(); ctx.clip();
                if(p.img) ctx.drawImage(p.img, px - r, py - r, r * 2, r * 2);
                ctx.strokeStyle = "rgba(255,255,255,0.8)"; ctx.lineWidth = 2*s; ctx.stroke();
            }
            ctx.restore();
        });
    }

    // --- 初始化 ---
    async function init() {
        courtImage = await new Promise(res => {
            const img = new Image(); img.crossOrigin = "anonymous";
            img.src = "https://raw.githubusercontent.com/goodskyfly-cell/BBOARD/main/basketball%20court%202%20(NEW).png";
            img.onload = () => res(img);
        });
        const names = ["01.png", "05.png", "06.png", "07.png", "08.png", "09.png", "10.png", "12.png", "13.png", "15.png", "23.png", "89.png"];
        playerImages = await Promise.all(names.map(n => new Promise(res => {
            const img = new Image(); img.crossOrigin="anonymous";
            img.src = `https://raw.githubusercontent.com/goodskyfly-cell/newboard/main/${n}`;
            img.onload = () => res(img); img.onerror = () => res(null);
        })));
        resetItems();
        initDrag();
        initDraggableVoice();
        window.addEventListener('resize', resize);
        resize();
        initVoice(); // 預初始化語音
    }

    function initDrag() {
        const getP = (e) => {
            const r = canvas.getBoundingClientRect();
            const tx = e.touches ? e.touches[0].clientX : e.clientX;
            const ty = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (tx - r.left) / (canvas.width / BASE_W), y: (ty - r.top) / (canvas.width / BASE_W) };
        };
        const start = (e) => { if(isPlaying) return; const p = getP(e); dragTarget = items.slice().reverse().find(i => Math.hypot(i.x - p.x, i.y - p.y) < 40); };
        const move = (e) => { if(dragTarget && !isPlaying) { if(e.touches) e.preventDefault(); const p = getP(e); dragTarget.x = p.x; dragTarget.y = p.y; render(); }};
        canvas.addEventListener('mousedown', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', () => dragTarget = null);
        canvas.addEventListener('touchstart', (e) => { start(e.touches[0]); if(dragTarget) e.preventDefault(); }, {passive:false});
        window.addEventListener('touchmove', (e) => { move(e.touches[0]); }, {passive:false});
        window.addEventListener('touchend', () => dragTarget = null);
    }

    function initDraggableVoice() {
        const bar = document.getElementById('dragVoice');
        let active = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;
        const dragStart = (e) => {
            if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            initialX = clientX - xOffset; initialY = clientY - yOffset; active = true;
        };
        const drag = (e) => {
            if (active) {
                if(e.touches) e.preventDefault();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                currentX = clientX - initialX; currentY = clientY - initialY;
                xOffset = currentX; yOffset = currentY;
                bar.style.transform = `translate(calc(-50% + ${currentX}px), ${currentY}px)`;
            }
        };
        bar.addEventListener('mousedown', dragStart);
        window.addEventListener('mousemove', drag);
        window.addEventListener('mouseup', () => active = false);
        bar.addEventListener('touchstart', dragStart, {passive:false});
        window.addEventListener('touchmove', drag, {passive:false});
        window.addEventListener('touchend', () => active = false);
    }

    function resize() {
        const stage = document.getElementById('mainStage').getBoundingClientRect();
        const ratio = BASE_W / BASE_H;
        let w = stage.width, h = stage.height;
        if(w / h > ratio) w = h * ratio; else h = w / ratio;
        canvas.width = w; canvas.height = h;
        render();
    }

    function record() { frames.push(items.map(i => ({...i, imgSrc: i.img ? i.img.src.split('/').pop() : ''}))); document.getElementById('saveCount').innerText = frames.length; }
    function resetItems() { items = playerImages.filter(m => m).map((img, i) => ({ x: 80 + i * 75, y: 100, img, type: 'player' })); items.push({ x: 500, y: 286, type: 'ball' }); render(); }
    function clearFrames() { frames = []; document.getElementById('saveCount').innerText = "0"; }
    function toggleSidebar(dir) { document.getElementById(dir === 'L' ? 'sidebarL' : 'sidebarR').classList.toggle('active'); }
    function toggleFull() {
        const stage = document.getElementById('mainStage');
        if (!document.fullscreenElement && !stage.classList.contains('ios-full-mode')) {
            if (stage.requestFullscreen) stage.requestFullscreen();
            else if (stage.webkitRequestFullscreen) stage.webkitRequestFullscreen();
            else stage.classList.add('ios-full-mode');
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            else stage.classList.remove('ios-full-mode');
        }
        setTimeout(resize, 150);
    }

    init();
</script>
</body>
</html>
