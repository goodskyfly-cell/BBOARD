<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>籃球戰術平台 Pro - 線條修復版</title>
    <style>
        body { margin: 0; padding: 0; background-color: #1a202c; font-family: sans-serif; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { text-align: center; background: #2d3748; padding: 10px; font-weight: bold; }
        #step-info { color: #f6e05e; }
        .canvas-container { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #1a202c; }
        canvas { background-color: #f39c12; border: 2px solid #5d3a1a; touch-action: none; cursor: crosshair; }
        .controls-overlay { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 1000; }
        button { padding: 10px 18px; border-radius: 8px; border: none; color: white; font-weight: bold; font-size: 1rem; cursor: pointer; }
        .btn-blue { background: #3182ce; }
        .btn-green { background: #38a169; }
        .btn-red { background: #e53e3e; }
        .btn-orange { background: #d69e2e; }
    </style>
</head>
<body>

<div class="header">🏀 籃球戰術平台 Pro | <span id="step-info">已儲存：0/20 點位</span></div>

<div class="canvas-container" id="main-container">
    <canvas id="courtCanvas"></canvas>
    <div class="controls-overlay">
        <button class="btn-orange" id="mark-btn">📌 紀錄</button>
        <button class="btn-green" id="play-btn">▶️ 播放</button>
        <button class="btn-red" id="stop-btn">⏹️ 停止</button>
        <button class="btn-blue" id="full-btn">📺 全螢幕</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('courtCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('main-container');

    const BASE_W = 900, BASE_H = 660, COURT_H = 600;
    let items = [], keyframes = [], images = [], scaleRatio = 1;

    const imgNames = ["01.png", "05.png", "06.png", "07.png", "08.png", "09.png", "10.png", "12.png", "13.png", "15.png", "23.png", "89.png"];
    const imgUrls = imgNames.map(name => `https://raw.githubusercontent.com/goodskyfly-cell/newboard/main/${name}`);

    async function init() {
        images = await Promise.all(imgUrls.map(url => new Promise(res => {
            const img = new Image(); img.crossOrigin = "anonymous"; img.src = url;
            img.onload = () => res(img); img.onerror = () => res(null);
        })));
        resetBoard();
        window.addEventListener('resize', render);
        render();
    }

    function resetBoard() {
        items = [];
        images.forEach((img, i) => { if(img) items.push({ x: 50 + i * 72, y: 630, img: img, type: 'player' }); });
        items.push({ x: 450, y: 300, type: 'ball' });
        keyframes = [];
    }

    // --- 關鍵修正：確保線條繪製函式被呼叫 ---
    function drawCourt(s) {
        ctx.save();
        ctx.strokeStyle = "white";
        ctx.lineWidth = 3 * s;

        // 1. 外框
        ctx.strokeRect(20 * s, 20 * s, 860 * s, 560 * s);

        // 2. 中線與中圈
        ctx.beginPath();
        ctx.moveTo(450 * s, 20 * s); ctx.lineTo(450 * s, 580 * s);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(450 * s, 300 * s, 60 * s, 0, Math.PI * 2);
        ctx.stroke();

        // 3. 禁區與三分線 (標準比例)
        [true, false].forEach(isLeft => {
            const offset = isLeft ? 20 * s : 880 * s;
            const dir = isLeft ? 1 : -1;
            
            // 禁區
            ctx.strokeRect(isLeft ? 20 * s : 710 * s, 210 * s, 170 * s, 180 * s);
            
            // 三分線弧
            ctx.beginPath();
            ctx.arc(isLeft ? 60 * s : 840 * s, 300 * s, 230 * s, (isLeft ? -1.2 : 1.9), (isLeft ? 1.2 : 4.4));
            ctx.stroke();
        });
        ctx.restore();
    }

    function render() {
        // 更新畫布大小以適應螢幕
        const containerW = container.clientWidth;
        const containerH = container.clientHeight;
        scaleRatio = Math.min(containerW / BASE_W, containerH / BASE_H);
        
        canvas.width = BASE_W * scaleRatio;
        canvas.height = BASE_H * scaleRatio;

        // 繪製順序：1. 背景 (由 CSS 或 fillRect 控制)
        ctx.fillStyle = "#f39c12";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. 繪製球場線條 (確保傳入當前倍率)
        drawCourt(scaleRatio);

        // 3. 繪製球員與球
        const radius = 24 * scaleRatio;
        items.forEach(p => {
            const dx = p.x * scaleRatio;
            const dy = p.y * scaleRatio;
            ctx.save();
            if(p.type === 'ball') {
                ctx.beginPath(); ctx.arc(dx, dy, radius * 0.6, 0, Math.PI * 2);
                ctx.fillStyle = "#ff4500"; ctx.fill(); ctx.strokeStyle = "black"; ctx.stroke();
            } else {
                ctx.beginPath(); ctx.arc(dx, dy, radius, 0, Math.PI * 2);
                ctx.fillStyle = "white"; ctx.fill(); ctx.clip();
                if(p.img) ctx.drawImage(p.img, dx - radius, dy - radius, radius * 2, radius * 2);
                ctx.restore();
                ctx.beginPath(); ctx.arc(dx, dy, radius, 0, Math.PI * 2);
                ctx.strokeStyle = "#333"; ctx.lineWidth = 2 * scaleRatio; ctx.stroke();
            }
            ctx.restore();
        });
    }

    // 觸控與拖曳 (簡化相容版)
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const ev = e.touches ? e.touches[0] : e;
        return { x: (ev.clientX - rect.left) / scaleRatio, y: (ev.clientY - rect.top) / scaleRatio };
    }

    canvas.addEventListener('mousedown', startDrag);
    canvas.addEventListener('touchstart', startDrag, {passive: false});
    function startDrag(e) {
        const p = getPos(e);
        dragTarget = items.findLast(i => Math.hypot(i.x - p.x, i.y - p.y) < 30);
        if(e.type === 'touchstart') e.preventDefault();
    }

    window.addEventListener('mousemove', doDrag);
    window.addEventListener('touchmove', doDrag, {passive: false});
    function doDrag(e) {
        if(!dragTarget) return;
        const p = getPos(e);
        dragTarget.x = p.x; dragTarget.y = p.y;
        render();
        if(e.type === 'touchmove') e.preventDefault();
    }

    window.addEventListener('mouseup', () => dragTarget = null);
    window.addEventListener('touchend', () => dragTarget = null);

    document.getElementById('full-btn').onclick = () => {
        if (!document.fullscreenElement) container.requestFullscreen();
        else document.exitFullscreen();
    };

    init();
</script>
</body>
</html>
