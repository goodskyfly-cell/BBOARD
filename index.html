<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>籃球戰術平台 Pro - 滿版劇本版</title>
    <style>
        body { margin: 0; padding: 0; background-color: #1a202c; font-family: 'Microsoft JhengHei', sans-serif; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* 側邊抽屜樣式 */
        .sidebar { 
            position: fixed; 
            left: -200px; /* 平時隱藏 */
            top: 0; 
            width: 200px; 
            height: 100%; 
            background: #2d3748; 
            z-index: 100; 
            transition: 0.3s; 
            display: flex; 
            flex-direction: column; 
            padding: 15px; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.5); 
        }
        .sidebar.active { left: 0; } /* 點選後滑出 */

        /* 側邊切換標籤 */
        .sidebar-toggle { 
            position: absolute; 
            right: -40px; 
            top: 20px; 
            width: 40px; 
            height: 100px; 
            background: #3182ce; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            writing-mode: vertical-rl; 
            border-radius: 0 8px 8px 0; 
            cursor: pointer; 
            font-size: 0.9rem; 
            font-weight: bold;
        }

        /* 球場顯示區：自動佔滿剩餘寬度 */
        .board-container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 10px;
        }

        canvas { 
            background-color: #f39c12; 
            border: 3px solid #5d3a1a; 
            border-radius: 5px; 
            max-height: 80vh; /* 提高畫布高度占比 */
            max-width: 95%; 
            object-fit: contain; 
            touch-action: none; 
        }

        .control-row { margin-top: 10px; display: flex; gap: 10px; justify-content: center; }
        
        /* 底部語音列：整合在一起 */
        .voice-row { 
            display: flex; 
            background: #2d3748; 
            padding: 10px 20px; 
            gap: 15px; 
            align-items: center; 
            border-top: 1px solid #4a5568; 
        }
        #transcript { flex: 1; font-size: 1.5rem; color: #f6e05e; font-weight: bold; }

        button { padding: 10px 18px; border-radius: 6px; font-weight: bold; border: none; cursor: pointer; }
        .btn-step { background: #d69e2e; color: white; }
        .btn-full { background: #4a5568; color: white; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-toggle" onclick="toggleSidebar()">📁 我的戰術庫</div>
    <h3 style="margin:0;">戰術列表</h3>
    <div id="tactic-list" style="flex:1; overflow-y:auto; margin-top:10px;"></div>
    <button onclick="saveToCloud()" style="background:#3182ce; color:white;">💾 儲存戰術</button>
</div>

<div class="board-container">
    <div id="step-info" style="color:#f6e05e; font-weight:bold; margin-bottom:5px;">已設定：0 / 20</div>
    <canvas id="courtCanvas" width="900" height="600"></canvas>
    <div class="control-row">
        <button id="next-step-btn" class="btn-step">📌 儲存此格</button>
        <button onclick="playTactic()" style="background:#38a169; color:white;">▶️ 播放</button>
        <button onclick="stopAnimation()" style="background:#e53e3e; color:white;">⏹️ 停止</button>
        <button id="fullscreen-btn" class="btn-full">📺 全螢幕</button>
    </div>
</div>

<div class="voice-row">
    <div id="transcript">等待語音指令...</div>
    <button style="background:#3182ce; color:white;">🎤 錄音</button>
    <button style="background:#a0aec0; color:#1a202c;">🗑️ 清除</button>
</div>

<script>
    // 側邊欄切換邏輯
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
    }

    // 全螢幕切換
    document.getElementById('fullscreen-btn').onclick = () => {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        } else {
            document.exitFullscreen();
        }
    };

    // 其餘原本的畫布與 GAS 連接邏輯...
    // (此處保留您上一版本已完成的 JS 程式碼即可)
</script>
</body>
</html>
