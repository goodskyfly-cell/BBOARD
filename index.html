<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>籃球戰術平台 Pro - 平板穩定修復版</title>
    <style>
        :root { --primary: #3182ce; --success: #38a169; --danger: #e53e3e; --warning: #d69e2e; }
        body { margin: 0; padding: 0; background-color: #1a202c; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-family: sans-serif; }
        
        /* 頂部資訊 */
        .header { height: 40px; display: flex; align-items: center; justify-content: center; background: #2d3748; font-weight: bold; font-size: 0.9rem; z-index: 100; }
        #step-info { color: #f6e05e; }

        /* 主畫布區域 */
        .canvas-container { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; overflow: hidden; background: #1a202c; }
        canvas { background-color: #f39c12; border: 2px solid #5d3a1a; touch-action: none; cursor: crosshair; }
        
        /* 功能按鈕區 - 確保全螢幕下依然存在 */
        .controls-overlay { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 10px; z-index: 1000; pointer-events: auto;
        }

        /* 戰術庫側邊欄 - 平板觸控優化 */
        .sidebar { 
            position: absolute; left: -240px; top: 0; width: 220px; height: 100%; 
            background: #2d3748; transition: 0.3s; z-index: 2000; display: flex; flex-direction: column; padding: 10px;
        }
        .sidebar.active { left: 0; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        .sidebar-toggle { 
            position: absolute; right: -40px; top: 20px; width: 40px; height: 100px; 
            background: var(--primary); border-radius: 0 8px 8px 0; display: flex; 
            align-items: center; justify-content: center; writing-mode: vertical-rl; cursor: pointer;
        }

        button { 
            padding: 12px 18px; border-radius: 10px; border: none; color: white; 
            font-weight: bold; font-size: 1rem; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent;
        }
        .btn-blue { background: var(--primary); }
        .btn-green { background: var(--success); }
        .btn-red { background: var(--danger); }
        .btn-orange { background: var(--warning); }
        
        .tactic-item { background: #4a5568; padding: 10px; margin: 5px 0; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">🏀 籃球戰術平台 Pro | <span id="step-info">已儲存：0/20 點位</span></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-toggle" id="toggle-btn">📁 戰術清單</div>
    <h3 style="margin-top:0">我的戰術庫</h3>
    <div id="tactic-list" style="flex:1; overflow-y:auto;"></div>
    <button class="btn-blue" id="save-tactic-btn" style="width:100%">💾 儲存此戰術</button>
</div>

<div class="canvas-container" id="main-container">
    <canvas id="courtCanvas" width="900" height="660"></canvas>
    
    <div class="controls-overlay">
        <button class="btn-orange" id="mark-btn">📌 紀錄</button>
        <button class="btn-green" id="play-btn">▶️ 播放</button>
        <button class="btn-red" id="stop-btn">⏹️ 停止</button>
        <button class="btn-blue" id="full-btn">📺 全螢幕</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('courtCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('main-container');
    
    // 原始系統設定
    const BASE_W = 900, BASE_H = 660, PLAYER_R = 24;
    let items = [], dragTarget = null, keyframes = [], isPlaying = false, animeId = null;

    // 圖片資源
    const imgNames = ["01.png", "05.png", "06.png", "07.png", "08.png", "09.png", "10.png", "12.png", "13.png", "15.png", "23.png", "89.png"];
    const imgUrls = imgNames.map(name => `https://raw.githubusercontent.com/goodskyfly-cell/newboard/main/${name}`);
    let images = [];

    async function init() {
        images = await Promise.all(imgUrls.map(url => new Promise(res => {
            const img = new Image(); img.crossOrigin = "anonymous"; img.src = url;
            img.onload = () => res(img); img.onerror = () => res(null);
        })));
        resetBoard();
        render();
    }

    function resetBoard() {
        items = [];
        images.forEach((img, i) => { if(img) items.push({ x: 50 + i * 72, y: 620, img: img, type: 'player' }); });
        items.push({ x: 450, y: 300, type: 'ball' });
        keyframes = [];
        updateInfo();
    }

    function render() {
        // 自適應比例計算
        const scale = Math.min(container.clientWidth / BASE_W, container.clientHeight / BASE_H);
        canvas.width = BASE_W * scale; canvas.height = BASE_H * scale;
        
        ctx.save();
        ctx.scale(scale, scale);
        
        // 1. 畫球場 (修復線條比例)
        ctx.fillStyle = "#f39c12"; ctx.fillRect(0, 0, 900, 600);
        ctx.strokeStyle = "white"; ctx.lineWidth = 3;
        ctx.strokeRect(20, 20, 860, 560); // 邊線
        ctx.beginPath(); ctx.moveTo(450, 20); ctx.lineTo(450, 580); ctx.stroke(); // 中線
        ctx.beginPath(); ctx.arc(450, 300, 60, 0, Math.PI*2); ctx.stroke(); // 中圈

        // 2. 畫球員與球
        items.forEach(p => {
            ctx.save();
            if(p.type === 'ball') {
                ctx.beginPath(); ctx.arc(p.x, p.y, 15, 0, Math.PI*2);
                ctx.fillStyle = "#ff4500"; ctx.fill(); ctx.stroke();
            } else {
                ctx.beginPath(); ctx.arc(p.x, p.y, PLAYER_R, 0, Math.PI*2);
                ctx.fillStyle = "white"; ctx.fill(); ctx.clip();
                if(p.img) ctx.drawImage(p.img, p.x - PLAYER_R, p.y - PLAYER_R, PLAYER_R * 2, PLAYER_R * 2);
                ctx.restore();
                ctx.beginPath(); ctx.arc(p.x, p.y, PLAYER_R, 0, Math.PI*2); ctx.strokeStyle="#333"; ctx.stroke();
            }
            ctx.restore();
        });
        ctx.restore();
    }

    // 觸控邏輯優化 - 使用 Pointer Events (平板專用)
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const scale = canvas.width / BASE_W;
        return { x: (e.clientX - rect.left) / scale, y: (e.clientY - rect.top) / scale };
    }

    canvas.addEventListener('pointerdown', e => {
        const p = getPos(e);
        dragTarget = items.findLast(i => Math.hypot(i.x - p.x, i.y - p.y) < PLAYER_R);
        if(dragTarget) canvas.setPointerCapture(e.pointerId);
    });
    canvas.addEventListener('pointermove', e => {
        if(!dragTarget || isPlaying) return;
        const p = getPos(e);
        dragTarget.x = p.x; dragTarget.y = p.y;
        render();
    });
    canvas.addEventListener('pointerup', e => dragTarget = null);

    // 功能按鈕綁定 (全螢幕相容)
    document.getElementById('full-btn').addEventListener('click', () => {
        if (!document.fullscreenElement) {
            container.requestFullscreen().catch(err => alert("平板限制：請點擊後再試一次"));
        } else {
            document.exitFullscreen();
        }
    });

    document.getElementById('mark-btn').onclick = () => {
        if(keyframes.length >= 20) return;
        keyframes.push(JSON.parse(JSON.stringify(items)));
        updateInfo();
    };

    document.getElementById('play-btn').onclick = () => {
        if(keyframes.length < 2) return alert("請至少儲存兩個點位");
        isPlaying = true;
        let step = 0, frame = 0;
        const animate = () => {
            if(!isPlaying) return;
            const start = keyframes[step], end = keyframes[step+1];
            items.forEach((item, i) => {
                item.x = start[i].x + (end[i].x - start[i].x) * (frame/30);
                item.y = start[i].y + (end[i].y - start[i].y) * (frame/30);
            });
            render();
            frame++;
            if(frame > 30) { frame = 0; step++; }
            if(step < keyframes.length - 1) animeId = requestAnimationFrame(animate);
            else isPlaying = false;
        };
        animate();
    };

    document.getElementById('stop-btn').onclick = () => {
        isPlaying = false;
        cancelAnimationFrame(animeId);
        resetBoard();
        render();
    };

    // 戰術庫儲存功能 (LocalStorage)
    document.getElementById('save-tactic-btn').onclick = () => {
        if(keyframes.length === 0) return alert("無戰術內容");
        const name = prompt("請輸入戰術名稱", "新戰術 " + new Date().toLocaleTimeString());
        if(!name) return;
        const saved = JSON.parse(localStorage.getItem('bball_tactics') || '[]');
        saved.push({ name, data: keyframes });
        localStorage.setItem('bball_tactics', JSON.stringify(saved));
        loadTactics();
    };

    function loadTactics() {
        const list = document.getElementById('tactic-list');
        const saved = JSON.parse(localStorage.getItem('bball_tactics') || '[]');
        list.innerHTML = saved.map((t, i) => `<div class="tactic-item" onclick="applyTactic(${i})">${t.name}</div>`).join('');
    }

    window.applyTactic = (index) => {
        const saved = JSON.parse(localStorage.getItem('bball_tactics') || '[]');
        keyframes = saved[index].data;
        items = JSON.parse(JSON.stringify(keyframes[0]));
        updateInfo();
        render();
        toggleSidebar();
    };

    function updateInfo() { document.getElementById('step-info').innerText = `已儲存：${keyframes.length}/20 點位`; }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    document.getElementById('toggle-btn').onclick = toggleSidebar;

    window.addEventListener('resize', render);
    init();
</script>
</body>
</html>
