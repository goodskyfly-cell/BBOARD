<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>籃球戰術平台 Pro - 語音與方向修正</title>
    <style>
        :root { --panel: rgba(25, 25, 25, 0.98); --border: rgba(255,255,255,0.15); }
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; height: 100vh; display: flex; font-family: -apple-system, sans-serif; color: white; }
        
        .stage { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; background: #000; }
        canvas { background-color: #111; touch-action: none; z-index: 5; }

        /* 語音列修正 */
        .voice-bar { 
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 10001; background: var(--panel); backdrop-filter: blur(10px); 
            padding: 8px 12px; border-radius: 12px; border: 1px solid var(--border); 
            display: flex; gap: 10px; align-items: center; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); width: 85%; max-width: 480px;
            touch-action: none;
        }
        .drag-handle { cursor: move; padding: 0 10px; color: #718096; font-size: 24px; user-select: none; }
        
        /* 修正：文字由右至左顯示 */
        input#v-output { 
            flex: 1; background: #1a202c; border: 1px solid #4a5568; 
            color: #f6e05e; padding: 8px; border-radius: 6px; 
            outline: none; font-size: 16px; font-weight: bold;
            direction: rtl; /* 由右至左 */
            text-align: right; /* 文字靠右 */
        }

        .panel-btn { width: 100%; padding: 14px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-bottom: 12px; }
        .btn-purple { background: #805ad5; transition: 0.3s; }
        .btn-purple.active { background: #f56565; animation: pulse 1s infinite; }
        .btn-gray { background: #4a5568; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* 側邊欄與控制 */
        .sidebar { position: absolute; top: 0; height: 100%; background: var(--panel); transition: transform 0.3s ease; z-index: 4000; width: 260px; }
        .sidebar-left { left: 0; transform: translateX(-260px); border-right: 1px solid var(--border); }
        .sidebar-right { right: 0; transform: translateX(260px); border-left: 1px solid var(--border); }
        .sidebar.active { transform: translateX(0); }
        .tab { position: absolute; width: 42px; height: 120px; display: flex; align-items: center; justify-content: center; writing-mode: vertical-lr; cursor: pointer; color: white; z-index: 4001; }
        .left-tab { right: -42px; top: 20%; background: #3182ce; border-radius: 0 10px 10px 0; }
        .right-tab { left: -42px; top: 20%; background: #38a169; border-radius: 10px 0 0 10px; }

        .play-controls { position: absolute; bottom: -120px; left: 50%; transform: translateX(-50%); z-index: 10000; transition: bottom 0.4s; background: var(--panel); padding: 15px 30px; border-radius: 50px; display: flex; gap: 20px; border: 1px solid var(--border); }
        .play-controls.active { bottom: 40px; }
        .control-btn { border: none; border-radius: 50%; width: 55px; height: 55px; cursor: pointer; font-size: 24px; color: white; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="stage" id="mainStage">
    <div class="voice-bar" id="dragVoice">
        <div class="drag-handle" id="v-handle">⠿</div>
        <button class="panel-btn btn-purple" id="v-btn" style="width:auto; margin:0; padding:8px 15px;" onclick="toggleVoice()">🎤 說話</button>
        <input type="text" id="v-output" placeholder="...文字將由右至左出現" readonly>
        <button class="panel-btn btn-gray" style="width:auto; margin:0; padding:8px 10px;" onclick="document.getElementById('v-output').value=''">清空</button>
    </div>

    <div class="play-controls" id="playUI">
        <button class="control-btn" style="background:#38a169;" onclick="resumeAnim()">▶</button>
        <button class="control-btn" style="background:#ecc94b;" onclick="pauseAnim()">Ⅱ</button>
        <button class="control-btn" style="background:#e53e3e;" onclick="stopAnim()">■</button>
    </div>

    <div class="sidebar sidebar-left" id="sidebarL">
        <div class="tab left-tab" onclick="toggleSidebar('L')">戰術庫 ◀</div>
        <div class="sidebar-content" style="padding:20px;"><div id="tacticList"></div></div>
    </div>

    <div class="sidebar sidebar-right" id="sidebarR">
        <div class="tab right-tab" onclick="toggleSidebar('R')">工具 ◀</div>
        <div class="sidebar-content" style="padding:20px;">
            <button class="panel-btn" style="background:#38a169;" onclick="record()">📌 紀錄點位</button>
            <button class="panel-btn" style="background:#3182ce;" onclick="startPlay()">▶ 播放 (慢速)</button>
            <div style="text-align:center; margin-bottom:10px;">點位：<span id="fCount" style="color:#38a169">0</span></div>
            <button class="panel-btn btn-purple" onclick="saveTactic()">💾 儲存戰術</button>
            <hr style="border:0; border-top:1px solid #444; margin: 15px 0;">
            <button class="panel-btn btn-gray" onclick="resetItems()">🔄 重置位置</button>
            <button class="panel-btn btn-gray" style="background:#e53e3e;" onclick="clearFrames()">🗑️ 清空紀錄</button>
            <button class="panel-btn btn-gray" onclick="toggleFull()" style="margin-top:20px;">📺 全螢幕</button>
        </div>
    </div>

    <canvas id="court"></canvas>
</div>

<script>
    // --- 語音功能修正版 ---
    let recognition = null;
    let isListening = false;

    function initVoice() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) return alert("瀏覽器不支援語音辨識");
        
        recognition = new Speech();
        recognition.lang = 'zh-TW';
        recognition.continuous = true;
        recognition.interimResults = true;

        recognition.onstart = () => {
            isListening = true;
            const btn = document.getElementById('v-btn');
            btn.innerText = "🛑 停止";
            btn.classList.add('active');
        };

        recognition.onresult = (e) => {
            let res = "";
            for (let i = e.resultIndex; i < e.results.length; i++) {
                res += e.results[i][0].transcript;
            }
            document.getElementById('v-output').value = res;
        };

        recognition.onerror = () => stopListening();
        recognition.onend = () => { if(isListening) recognition.start(); };
    }

    function toggleVoice() {
        if (!recognition) initVoice();
        if (!isListening) {
            recognition.start();
        } else {
            stopListening();
        }
    }

    function stopListening() {
        isListening = false;
        if (recognition) recognition.stop();
        const btn = document.getElementById('v-btn');
        btn.innerText = "🎤 說話";
        btn.classList.remove('active');
    }

    // --- 畫布與基礎邏輯 ---
    const canvas = document.getElementById('court');
    const ctx = canvas.getContext('2d');
    const BASE_W = 1000, BASE_H = 572;
    let items = [], frames = [], playerImages = [], courtImg = null;
    let isPlaying = false, isPaused = false, currentFrame = 0, t = 0;

    function animate() {
        if (!isPlaying || isPaused) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if(courtImg) ctx.drawImage(courtImg, 0, 0, canvas.width, canvas.height);
        const start = frames[currentFrame], end = frames[currentFrame + 1], s = canvas.width / BASE_W;
        start.forEach((it, i) => {
            const cx = (it.x + (end[i].x - it.x) * t) * s, cy = (it.y + (end[i].y - it.y) * t) * s;
            drawItem(cx, cy, it.type, i, s);
        });
        t += 0.008; // 速度 0.008
        if (t >= 1) { t = 0; currentFrame++; }
        if (currentFrame >= frames.length - 1) { isPlaying = false; return; }
        requestAnimationFrame(animate);
    }

    // --- 介面控制 ---
    function startPlay() {
        if (frames.length < 2) return alert("點位不足");
        document.getElementById('sidebarL').classList.remove('active');
        document.getElementById('sidebarR').classList.remove('active');
        document.getElementById('playUI').classList.add('active');
        currentFrame = 0; t = 0; isPlaying = true; isPaused = false;
        requestAnimationFrame(animate);
    }

    function stopAnim() { isPlaying = false; document.getElementById('playUI').classList.remove('active'); render(); }
    function pauseAnim() { isPaused = !isPaused; if(!isPaused) requestAnimationFrame(animate); }
    function resumeAnim() { if(!isPlaying) startPlay(); else isPaused = false; requestAnimationFrame(animate); }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if(courtImg) ctx.drawImage(courtImg, 0, 0, canvas.width, canvas.height);
        const s = canvas.width / BASE_W;
        items.forEach((p, i) => drawItem(p.x * s, p.y * s, p.type, i, s));
    }
    function drawItem(x, y, type, idx, s) {
        const r = (type === 'ball' ? 18 : 34) * s;
        ctx.save(); ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
        if (type === 'ball') { ctx.fillStyle = "#ff5722"; ctx.fill(); } 
        else { ctx.fillStyle = "white"; ctx.fill(); ctx.clip(); if (playerImages[idx]) ctx.drawImage(playerImages[idx], x - r, y - r, r * 2, r * 2); }
        ctx.strokeStyle = "white"; ctx.lineWidth = 2 * s; ctx.stroke(); ctx.restore();
    }
    function record() { frames.push(JSON.parse(JSON.stringify(items))); document.getElementById('fCount').innerText = frames.length; }
    function toggleSidebar(dir) { document.getElementById(dir === 'L' ? 'sidebarL' : 'sidebarR').classList.toggle('active'); }
    function toggleFull() { if (!document.fullscreenElement) document.getElementById('mainStage').requestFullscreen(); else document.exitFullscreen(); }
    function resize() {
        const stage = document.getElementById('mainStage');
        const ratio = BASE_W / BASE_H;
        let w = stage.clientWidth, h = stage.clientHeight;
        if (w / h > ratio) w = h * ratio; else h = w / ratio;
        canvas.width = w; canvas.height = h; render();
    }

    // --- 初始化 ---
    async function init() {
        courtImg = await new Promise(res => { const img = new Image(); img.crossOrigin="anonymous"; img.src="https://raw.githubusercontent.com/goodskyfly-cell/BBOARD/main/basketball%20court%202%20(NEW).png"; img.onload=()=>res(img); });
        const names = ["01.png", "05.png", "06.png", "07.png", "08.png", "09.png", "10.png", "12.png", "13.png", "15.png", "23.png", "89.png"];
        playerImages = await Promise.all(names.map(n => new Promise(res => { const img = new Image(); img.crossOrigin="anonymous"; img.src=`https://raw.githubusercontent.com/goodskyfly-cell/newboard/main/${n}`; img.onload=()=>res(img); })));
        resetItems();
        initDrag();
        initDraggableVoice();
        window.addEventListener('resize', resize);
        document.addEventListener('fullscreenchange', resize);
        resize();
    }
    function resetItems() { items = playerImages.map((img, i) => ({ x: 80 + i * 75, y: 100, type: 'player' })); items.push({ x: 500, y: 286, type: 'ball' }); render(); }
    function clearFrames() { frames = []; document.getElementById('fCount').innerText = "0"; }

    function initDrag() {
        let target = null;
        const getP = (e) => {
            const r = canvas.getBoundingClientRect();
            const tx = e.touches ? e.touches[0].clientX : e.clientX;
            const ty = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (tx - r.left) / (canvas.width / BASE_W), y: (ty - r.top) / (canvas.width / BASE_W) };
        };
        canvas.addEventListener('mousedown', (e) => { if(isPlaying) return; const p = getP(e); target = items.slice().reverse().find(i => Math.hypot(i.x - p.x, i.y - p.y) < 40); });
        window.addEventListener('mousemove', (e) => { if (target) { const p = getP(e); target.x = p.x; target.y = p.y; render(); }});
        window.addEventListener('mouseup', () => target = null);
        canvas.addEventListener('touchstart', (e) => { if(isPlaying) return; const p = getP(e.touches[0]); target = items.slice().reverse().find(i => Math.hypot(i.x - p.x, i.y - p.y) < 40); if(target) e.preventDefault(); }, {passive:false});
        window.addEventListener('touchmove', (e) => { if (target) { const p = getP(e.touches[0]); target.x = p.x; target.y = p.y; render(); e.preventDefault(); }}, {passive:false});
    }

    function initDraggableVoice() {
        const bar = document.getElementById('dragVoice');
        const handle = document.getElementById('v-handle');
        let active = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;
        const dragStart = (e) => {
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            initialX = cx - xOffset; initialY = cy - yOffset;
            if (e.target === handle || e.target === bar) active = true;
        };
        const dragMove = (e) => { if (active) {
            e.preventDefault();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            currentX = cx - initialX; currentY = cy - initialY;
            xOffset = currentX; yOffset = currentY;
            bar.style.transform = `translate3d(calc(-50% + ${currentX}px), ${currentY}px, 0)`;
        }};
        bar.addEventListener('mousedown', dragStart); window.addEventListener('mousemove', dragMove); window.addEventListener('mouseup', () => active = false);
        bar.addEventListener('touchstart', dragStart, {passive:false}); window.addEventListener('touchmove', dragMove, {passive:false}); window.addEventListener('touchend', () => active = false);
    }

    init();
</script>
</body>
</html>
