<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>籃球戰術平台 Pro - 分格動畫版</title>
    <style>
        body { margin: 0; padding: 10px; background-color: #1a202c; font-family: 'Microsoft JhengHei', sans-serif; color: white; display: flex; flex-direction: column; align-items: center; height: 100vh; box-sizing: border-box; overflow: hidden; }
        @media (orientation: portrait) {
            body::before { content: "🔄 請將螢幕旋轉至橫向\n以獲得最佳戰術體驗"; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a202c; display: flex; justify-content: center; align-items: center; z-index: 9999; font-size: 1.8rem; color: #f39c12; text-align: center; white-space: pre-wrap; padding: 20px; }
            .main-container, .voice-container, .info { display: none !important; }
        }
        .info { text-align: center; margin-bottom: 8px; }
        .main-container { display: flex; gap: 15px; flex: 1; width: 100%; max-width: 1280px; overflow: hidden; align-items: stretch; }
        .sidebar { width: 180px; background: #2d3748; padding: 12px; border-radius: 8px; border: 1px solid #4a5568; display: flex; flex-direction: column; }
        #tactic-list { flex: 1; overflow-y: auto; margin: 10px 0; border: 1px inset #4a5568; background: #1a202c; }
        .tactic-item { background: #4a5568; padding: 8px; margin-bottom: 5px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        
        .board-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        canvas { background-color: #f39c12; border: 4px solid #5d3a1a; border-radius: 5px; max-height: 60vh; max-width: 100%; object-fit: contain; touch-action: none; }
        
        .step-indicator { margin-top: 5px; font-weight: bold; color: #f6e05e; font-size: 1.1rem; }
        .animation-controls { margin-top: 10px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

        .voice-container { width: 100%; max-width: 1150px; background: #2d3748; padding: 8px 15px; border-radius: 8px; margin-top: 8px; }
        #transcript { background: #1a202c; padding: 8px; border-radius: 5px; min-height: 35px; color: #edf2f7; font-size: 1.1rem; border: 1px inset #4a5568; margin-bottom: 5px; }

        button { padding: 10px 18px; border-radius: 5px; font-weight: bold; cursor: pointer; border: none; font-size: 0.9rem; transition: 0.3s; }
        .btn-step { background: #d69e2e; color: white; } /* 設定分格 */
        .btn-play { background: #38a169; color: white; }
        .btn-stop { background: #e53e3e; color: white; }
        .btn-reset { background: #edf2f7; color: #2d3748; }
        #save-btn { background: #3182ce; color: white; margin-top: auto; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="info">
    <h2>🏀 籃球戰術平台 Pro - 分格導引模式</h2>
</div>

<div class="main-container">
    <div class="sidebar">
        <h3 style="margin:0; font-size:1rem;">📂 戰術庫</h3>
        <div id="tactic-list"></div>
        <button id="save-btn">💾 儲存戰術</button>
    </div>
    <div class="board-container">
        <div class="step-indicator" id="step-info">目前狀態：設定第 1 格位置</div>
        <canvas id="courtCanvas" width="900" height="600"></canvas>
        <div class="animation-controls">
            <button id="next-step-btn" class="btn-step">📌 儲存此格點位</button>
            <button id="play-btn" class="btn-play">▶️ 播放動畫</button>
            <button id="stop-btn" class="btn-stop">⏹️ 停止播放</button>
            <button id="reset-btn" class="btn-reset">🔄 全重置</button>
        </div>
    </div>
</div>

<div class="voice-container">
    <div id="transcript">等待語音輸入...</div>
    <div style="display:flex; gap:10px; justify-content:center;">
        <button id="mic-btn" style="background:#3182ce; color:white;">🎤 語音記錄</button>
        <button id="clear-btn" style="background:#718096; color:white;">🗑️ 清除</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('courtCanvas');
    const ctx = canvas.getContext('2d');
    const scale = 30; 
    const imgNames = ["01.png", "05.png", "06.png", "07.png", "08.png", "09.png", "10.png", "12.png", "13.png", "15.png", "23.png", "89.png"];
    const imgUrls = imgNames.map(name => `https://raw.githubusercontent.com/goodskyfly-cell/newboard/main/${name}`);

    let items = [], dragTarget = null, images = [];
    let keyframes = []; // 儲存每一格的所有球員位置
    let isPlaying = false;
    let animeId = null;

    async function init() {
        images = await Promise.all(imgUrls.map(url => new Promise(res => {
            const img = new Image(); img.crossOrigin = "anonymous"; img.src = url;
            img.onload = () => res(img); img.onerror = () => res(null);
        })));
        fullReset();
        loadTacticList();
    }

    function fullReset() {
        stopAnimation();
        keyframes = [];
        items = [];
        images.forEach((img, i) => { if(img) items.push({ x: 55 + i * 72, y: 545, r: 24, img: img, type: 'player' }); });
        items.push({ x: 450, y: 250, r: 15, type: 'ball' });
        updateStepInfo();
        render();
    }

    function updateStepInfo() {
        document.getElementById('step-info').innerText = `已設定格數：${keyframes.length} | 目前正在調整下一格`;
    }

    // --- 核心繪圖 ---
    function drawCourtLines() {
        ctx.strokeStyle = "white"; ctx.lineWidth = 2.5;
        const courtW = 28 * scale, courtH = 15 * scale;
        const offsetX = (canvas.width - courtW) / 2, offsetY = 50; 
        ctx.strokeRect(offsetX, offsetY, courtW, courtH);
        ctx.beginPath(); ctx.moveTo(canvas.width/2, offsetY); ctx.lineTo(canvas.width/2, offsetY + courtH); ctx.stroke();
        ctx.beginPath(); ctx.arc(canvas.width/2, offsetY + courtH/2, 1.8 * scale, 0, Math.PI*2); ctx.stroke();
        [true, false].forEach(isLeft => {
            const side = isLeft ? 1 : -1, baseLineX = isLeft ? offsetX : offsetX + courtW, centerY = offsetY + courtH/2;
            const hoopX = baseLineX + side * 1.575 * scale, r3 = 6.75 * scale, intersectY = (courtH/2) - 0.9 * scale, angle = Math.asin(intersectY / r3);
            ctx.beginPath(); ctx.moveTo(baseLineX, centerY - intersectY); ctx.lineTo(baseLineX + side * 1.575 * scale, centerY - intersectY);
            ctx.arc(hoopX, centerY, r3, isLeft ? -angle : Math.PI + angle, isLeft ? angle : Math.PI - angle, !isLeft);
            ctx.lineTo(baseLineX, centerY + intersectY); ctx.stroke();
            ctx.strokeRect(isLeft ? baseLineX : baseLineX - 5.8 * scale, centerY - 4.9 * scale / 2, 5.8 * scale, 4.9 * scale);
            ctx.beginPath(); ctx.arc(baseLineX + side * 5.8 * scale, centerY, 1.8 * scale, 0, Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.arc(hoopX, centerY, 7, 0, Math.PI*2); ctx.stroke();
        });
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawCourtLines();
        items.forEach(p => {
            ctx.save();
            if(p.type === 'ball') {
                ctx.translate(p.x, p.y);
                let grad = ctx.createRadialGradient(-p.r*0.3, -p.r*0.3, p.r*0.1, 0, 0, p.r);
                grad.addColorStop(0, '#f97316'); grad.addColorStop(1, '#7c2d12');
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fillStyle = "white"; ctx.fill(); ctx.clip(); 
                if(p.img) ctx.drawImage(p.img, p.x - p.r, p.y - p.r, p.r * 2, p.r * 2);
            }
            ctx.restore();
        });
    }

    // --- 分格動畫邏輯 ---
    document.getElementById('next-step-btn').onclick = () => {
        // 儲存當前所有物體的座標快照
        keyframes.push(items.map(i => ({ x: i.x, y: i.y })));
        updateStepInfo();
        alert(`第 ${keyframes.length} 格位置已儲存，請移動球員設定下一格。`);
    };

    function stopAnimation() {
        isPlaying = false;
        if(animeId) cancelAnimationFrame(animeId);
        document.getElementById('play-btn').disabled = false;
    }

    document.getElementById('stop-btn').onclick = stopAnimation;

    document.getElementById('play-btn').onclick = () => {
        if (keyframes.length < 2) return alert("請至少設定 2 格位置才能連成動畫！");
        isPlaying = true;
        document.getElementById('play-btn').disabled = true;
        
        let currentFrame = 0;
        let progress = 0; // 0 ~ 1 之間
        const speed = 0.02; // 移動速度

        function animate() {
            if (!isPlaying) return;

            const start = keyframes[currentFrame];
            const end = keyframes[currentFrame + 1];

            // 線性插值計算位置
            items.forEach((item, idx) => {
                item.x = start[idx].x + (end[idx].x - start[idx].x) * progress;
                item.y = start[idx].y + (end[idx].y - start[idx].y) * progress;
            });

            render();
            progress += speed;

            if (progress >= 1) {
                progress = 0;
                currentFrame++;
                if (currentFrame >= keyframes.length - 1) {
                    stopAnimation();
                    alert("動畫播放完畢");
                    return;
                }
            }
            animeId = requestAnimationFrame(animate);
        }
        animate();
    };

    // --- 其他功能 ---
    document.getElementById('save-btn').onclick = () => {
        const name = prompt("戰術名稱："); if (!name) return;
        let tactics = JSON.parse(localStorage.getItem('tactics_steps') || '[]');
        tactics.push({ name, keyframes: keyframes, date: new Date().toLocaleString() });
        localStorage.setItem('tactics_steps', JSON.stringify(tactics));
        loadTacticList();
    };

    function loadTacticList() {
        const list = document.getElementById('tactic-list'); list.innerHTML = "";
        let tactics = JSON.parse(localStorage.getItem('tactics_steps') || '[]');
        tactics.forEach((t) => {
            const item = document.createElement('div'); item.className = 'tactic-item';
            item.innerText = t.name; 
            item.onclick = () => { 
                keyframes = t.keyframes; 
                items.forEach((item, idx) => {
                    item.x = keyframes[0][idx].x;
                    item.y = keyframes[0][idx].y;
                });
                updateStepInfo(); render(); 
            };
            list.appendChild(item);
        });
    }

    function getPos(e) {
        const r = canvas.getBoundingClientRect();
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        const scaleX = 900 / r.width;
        const scaleY = 600 / r.height;
        return { x: (cx - r.left) * scaleX, y: (cy - r.top) * scaleY };
    }

    canvas.addEventListener('mousedown', e => {
        if(isPlaying) return;
        const p = getPos(e);
        for(let i = items.length - 1; i >= 0; i--) {
            if(Math.hypot(items[i].x - p.x, items[i].y - p.y) < items[i].r) { dragTarget = items[i]; break; }
        }
    });
    window.addEventListener('mousemove', e => { if(dragTarget) { const p = getPos(e); dragTarget.x = p.x; dragTarget.y = p.y; render(); } });
    window.addEventListener('mouseup', () => dragTarget = null);
    
    canvas.addEventListener('touchstart', e => {
        if(isPlaying) return;
        const p = getPos(e);
        for(let i = items.length - 1; i >= 0; i--) {
            if(Math.hypot(items[i].x - p.x, items[i].y - p.y) < items[i].r) { dragTarget = items[i]; e.preventDefault(); break; }
        }
    }, {passive: false});
    window.addEventListener('touchmove', e => { if(dragTarget) { const p = getPos(e); dragTarget.x = p.x; dragTarget.y = p.y; render(); e.preventDefault(); } }, {passive: false});
    window.addEventListener('touchend', () => dragTarget = null);

    document.getElementById('reset-btn').onclick = fullReset;
    init();
</script>
</body>
</html>
