<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>籃球戰術平台 Pro - 線條修復最終版</title>
    <style>
        body { margin: 0; padding: 0; background-color: #1a202c; overflow: hidden; height: 100vh; display: flex; flex-direction: column; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; }
        .status-bar { height: 40px; background: #2d3748; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; z-index: 10; }
        .canvas-container { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; background: #1a202c; }
        canvas { background-color: #f39c12; box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: grab; touch-action: none; border: 2px solid #4a5568; }
        .overlay-ui { position: absolute; bottom: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; gap: 10px; }
        .btn-group { pointer-events: auto; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); padding: 12px 24px; border-radius: 30px; display: flex; gap: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        button { border: none; border-radius: 20px; color: white; font-weight: bold; cursor: pointer; padding: 10px 18px; font-size: 14px; transition: 0.2s; }
        .btn-rec { background: #d69e2e; } .btn-play { background: #38a169; } .btn-reset { background: #e53e3e; } .btn-blue { background: #3182ce; }
        .sidebar { position: fixed; left: -260px; top: 0; width: 260px; height: 100%; background: #2d3748; z-index: 1001; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-right: 2px solid #4a5568; color: white; padding: 25px; box-sizing: border-box; }
        .sidebar.active { left: 0; }
        .sidebar-toggle { position: absolute; right: -42px; top: 100px; width: 42px; height: 100px; background: #3182ce; border-radius: 0 10px 10px 0; writing-mode: vertical-lr; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 13px; font-weight: bold; }
        .voice-wrap { pointer-events: auto; width: 500px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 15px; display: flex; gap: 8px; }
        input { flex: 1; background: #2d3748; border: 1px solid #4a5568; color: #63b3ed; padding: 8px 15px; border-radius: 8px; outline: none; }
    </style>
</head>
<body>

<div class="status-bar">🏀 籃球戰術平台 Pro | <span id="step-info" style="color:#f6e05e; margin-left:5px;">狀態：準備就緒</span></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('active')">戰術清單 ◀</div>
    <h3 style="margin-top:0">📁 戰術清單</h3>
    <hr style="border: 0; border-top: 1px solid #4a5568; margin: 15px 0;">
    <div id="save-list" style="font-size:14px; color:#a0aec0; text-align:center; padding:20px;">尚無存檔內容...</div>
</div>

<div class="canvas-container" id="wrap">
    <canvas id="courtCanvas"></canvas>
    <div class="overlay-ui">
        <div class="btn-group">
            <button class="btn-rec" onclick="record()">📌 紀錄點位</button>
            <button class="btn-play" onclick="play()">▶️ 播放動畫</button>
            <button class="btn-reset" onclick="resetAll()">🔄 重置歸零</button>
            <button class="btn-blue" onclick="toggleFull()">📺 全螢幕</button>
        </div>
        <div class="voice-wrap">
            <button class="btn-blue" id="v-btn" onclick="startVoice()">🎤 語音輸入</button>
            <input type="text" id="v-res" placeholder="辨識結果將顯示於此..." readonly>
            <button class="btn-reset" style="padding: 8px 12px;" onclick="document.getElementById('v-res').value=''">清空</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('courtCanvas');
    const ctx = canvas.getContext('2d');
    const wrap = document.getElementById('wrap');
    const BASE_W = 1200, BASE_H = 750;
    let items = [], images = [], frames = [], dragTarget = null;

    // --- 核心修復：強制重繪球場標線 ---
    function drawCourt(s) {
        if (s <= 0) return;
        ctx.save();
        ctx.strokeStyle = "white"; 
        ctx.lineWidth = 3 * s;
        ctx.lineCap = "round";

        const p = 40 * s; 
        const cw = canvas.width - p * 2, ch = canvas.height - p * 2;
        const cx = canvas.width / 2, cy = canvas.height / 2;

        // 1. 外部邊框與中線
        ctx.strokeRect(p, p, cw, ch);
        ctx.beginPath(); ctx.moveTo(cx, p); ctx.lineTo(cx, p + ch); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx, cy, 75 * s, 0, Math.PI * 2); ctx.stroke();

        // 2. 兩側禁區與三分線 (精確對稱修復)
        [1, -1].forEach(side => {
            const startX = side === 1 ? p : p + cw;
            const basketX = side === 1 ? p + (60 * s) : p + cw - (60 * s);
            const dir = side === 1 ? 1 : -1;
            
            // 禁區 (FIBA 標準比例)
            const lw = 240 * s, lh = 200 * s;
            ctx.strokeRect(side === 1 ? p : p + cw - lw, cy - lh/2, lw, lh);

            // 三分線邏輯修正：直線 + 圓弧
            const threeR = 280 * s; // 三分線半徑
            const straightY = 40 * s; // 離邊線距離
            
            ctx.beginPath();
            if (side === 1) {
                ctx.moveTo(p, p + straightY);
                ctx.arc(basketX, cy, threeR, -1.25, 1.25, false);
                ctx.lineTo(p, p + ch - straightY);
            } else {
                ctx.moveTo(p + cw, p + straightY);
                ctx.arc(basketX, cy, threeR, Math.PI + 1.25, Math.PI - 1.25, true);
                ctx.lineTo(p + cw, p + ch - straightY);
            }
            ctx.stroke();

            // 罰球圈
            ctx.beginPath();
            ctx.arc(p + dir * lw, cy, 75 * s, -Math.PI/2, Math.PI/2, side !== 1);
            ctx.stroke();
        });
        ctx.restore();
    }

    function render(t=null, sF=null, eF=null) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const s = canvas.width / BASE_W;
        drawCourt(s); // 確保線條優先繪製

        const data = t !== null ? sF.map((it, i) => ({ 
            x: it.x + (eF[i].x - it.x) * t, 
            y: it.y + (eF[i].y - it.y) * t, 
            img: it.img, type: it.type 
        })) : items;

        data.forEach(p => {
            const r = (p.type==='ball' ? 20 : 40) * s;
            ctx.save();
            ctx.beginPath(); ctx.arc(p.x * s, p.y * s, r, 0, Math.PI*2);
            if(p.type==='ball'){ ctx.fillStyle="#ff4500"; ctx.fill(); }
            else { 
                ctx.fillStyle="white"; ctx.fill(); ctx.clip(); 
                if(p.img) ctx.drawImage(p.img, p.x*s-r, p.y*s-r, r*2, r*2); 
            }
            ctx.strokeStyle="white"; ctx.lineWidth=2*s; ctx.stroke();
            ctx.restore();
        });
    }

    function resize() {
        const w = wrap.clientWidth - 40, h = wrap.clientHeight - 80;
        const ratio = Math.min(w / BASE_W, h / BASE_H);
        canvas.width = BASE_W * ratio; canvas.height = BASE_H * ratio;
        render();
    }

    async function init() {
        const names = ["01.png", "05.png", "06.png", "07.png", "08.png", "09.png", "10.png", "12.png", "13.png", "15.png", "23.png", "89.png"];
        images = await Promise.all(names.map(n => new Promise(res => {
            const img = new Image(); img.crossOrigin="anonymous";
            img.src = `https://raw.githubusercontent.com/goodskyfly-cell/newboard/main/${n}`;
            img.onload = () => res(img); img.onerror = () => res(null);
        })));
        resetPlayers();
        window.addEventListener('resize', resize);
        initInteraction();
        resize();
    }

    function resetPlayers() {
        items = images.filter(m => m).map((img, i) => ({ x: 80 + i * 90, y: 80, img, type: 'player' }));
        items.push({ x: 600, y: 375, type: 'ball' });
        render();
    }

    function initInteraction() {
        const getP = (e) => {
            const r = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            const s = canvas.width / BASE_W;
            return { x: (cx - r.left) / s, y: (cy - r.top) / s };
        };
        const start = (e) => { const p = getP(e); dragTarget = items.findLast(i => Math.hypot(i.x - p.x, i.y - p.y) < 50); };
        const move = (e) => { if(!dragTarget) return; const p = getP(e); dragTarget.x = p.x; dragTarget.y = p.y; render(); };
        canvas.addEventListener('mousedown', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', () => dragTarget = null);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); }, {passive: false});
        window.addEventListener('touchmove', (e) => { if(dragTarget) e.preventDefault(); move(e); }, {passive: false});
    }

    function record() { frames.push(items.map(i => ({...i}))); document.getElementById('step-info').innerText = `已紀錄：${frames.length} 點位`; }
    async function play() {
        if (frames.length < 2) return;
        for (let i = 0; i < frames.length - 1; i++) {
            for (let t = 0; t <= 1; t += 0.05) {
                render(t, frames[i], frames[i+1]);
                await new Promise(r => requestAnimationFrame(r));
            }
        }
    }
    function resetAll() { frames = []; document.getElementById('step-info').innerText = "狀態：已重置"; resetPlayers(); }
    function toggleFull() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
    function startVoice() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) return alert("瀏覽器不支援語音功能");
        const rec = new Speech(); rec.lang = 'zh-TW';
        rec.onstart = () => document.getElementById('v-btn').innerText = "🔴 聆聽中...";
        rec.onresult = (e) => document.getElementById('v-res').value = e.results[0][0].transcript;
        rec.onend = () => document.getElementById('v-btn').innerText = "🎤 語音輸入";
        rec.start();
    }

    init();
</script>
</body>
</html>
