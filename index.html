<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>籃球戰術平台 Pro - 右側面板版</title>
    <style>
        :root { --accent: #3182ce; --bg: #000000; --panel: rgba(20, 20, 20, 0.95); --border: rgba(255,255,255,0.1); }
        body { margin: 0; padding: 0; background-color: var(--bg); overflow: hidden; height: 100vh; display: flex; font-family: -apple-system, sans-serif; color: white; }
        
        .stage { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; z-index: 1; }
        canvas { background-color: #111; touch-action: none; cursor: crosshair; }

        /* 1. 可拖曳語音欄位 */
        .voice-bar { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 200; cursor: move; pointer-events: auto; 
            background: var(--panel); backdrop-filter: blur(10px); padding: 10px 15px; 
            border-radius: 12px; border: 1px solid var(--border); 
            display: flex; gap: 8px; align-items: center; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.5); width: 85%; max-width: 500px;
        }
        .voice-btn { background: #805ad5; border: none; border-radius: 8px; color: white; padding: 8px 12px; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .voice-btn.active { background: #f56565; animation: pulse 1.5s infinite; }
        input#v-output { flex: 1; background: #2d3748; border: none; color: #63b3ed; padding: 8px 12px; border-radius: 6px; outline: none; pointer-events: none; }

        /* 2. 左側：戰術庫 (維持原樣) */
        .sidebar-left { position: absolute; left: -260px; top: 0; width: 260px; height: 100%; background: var(--panel); transition: 0.3s; z-index: 150; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-left.active { left: 0; }
        .left-tab { position: absolute; right: -35px; top: 100px; width: 35px; height: 100px; background: #3182ce; display: flex; align-items: center; justify-content: center; writing-mode: vertical-lr; cursor: pointer; border-radius: 0 8px 8px 0; font-size: 12px; }

        /* 3. 右側：隱藏工作面板 (新功能) */
        .sidebar-right { position: absolute; right: -200px; top: 0; width: 200px; height: 100%; background: var(--panel); transition: 0.3s; z-index: 150; border-left: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 15px; gap: 12px; box-sizing: border-box; }
        .sidebar-right.active { right: 0; }
        .right-tab { position: absolute; left: -35px; top: 100px; width: 35px; height: 100px; background: #38a169; display: flex; align-items: center; justify-content: center; writing-mode: vertical-lr; cursor: pointer; border-radius: 8px 0 0 8px; font-size: 12px; }

        .panel-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .panel-btn:hover { filter: brightness(1.2); }
        .btn-green { background: #38a169; } .btn-blue { background: #3182ce; } .btn-gray { background: #4a5568; } .btn-red { background: #e53e3e; } .btn-purple { background: #805ad5; }

        .tactic-list { flex: 1; overflow-y: auto; padding: 10px; }
        .tactic-item { background: rgba(255,255,255,0.03); border-radius: 6px; padding: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; cursor: pointer; font-size: 13px; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="voice-bar" id="dragVoice">
    <button class="voice-btn" id="v-toggle" onclick="toggleVoice()">🎤 開始說話</button>
    <input type="text" id="v-output" placeholder="點擊開始或拖曳此處..." readonly>
    <button class="btn-red" style="padding: 5px 10px;" onclick="document.getElementById('v-output').value=''">✕</button>
</div>

<div class="sidebar-left" id="sidebarL">
    <div class="left-tab" onclick="toggleSidebar('L')">📁 戰術庫 ◀</div>
    <div style="padding: 20px 15px; border-bottom: 1px solid var(--border);">🏀 紀錄點位：<span id="saveCount">0</span></div>
    <div class="tactic-list" id="tacticList"></div>
</div>

<div class="sidebar-right" id="sidebarR">
    <div class="right-tab" onclick="toggleSidebar('R')">⚙️ 工作面板 ◀</div>
    <h4 style="margin-top:0; color: #a0aec0;">戰術操作</h4>
    <button class="panel-btn btn-green" onclick="record()">📌 紀錄點位</button>
    <button class="panel-btn btn-blue" onclick="play()">▶ 播放動畫</button>
    <button class="panel-btn btn-purple" onclick="saveTacticToStorage()">💾 儲存戰術</button>
    <hr style="width:100%; border: 0; border-top: 1px solid var(--border); margin: 10px 0;">
    <button class="panel-btn btn-gray" onclick="resetItems()">🔄 重置球員</button>
    <button class="panel-btn btn-red" onclick="clearFrames()">🗑️ 清空紀錄</button>
    <button class="panel-btn btn-gray" onclick="toggleFull()">📺 全螢幕模式</button>
</div>

<div class="stage" id="mainStage">
    <canvas id="court"></canvas>
</div>

<script>
    const canvas = document.getElementById('court');
    const ctx = canvas.getContext('2d');
    const BASE_W = 1000, BASE_H = 572; 
    let items = [], frames = [], playerImages = [], dragTarget = null;
    let recognition = null, isListening = false;
    let courtImage = null;

    // --- 1. 介面交互邏輯 ---
    function toggleSidebar(dir) {
        const id = dir === 'L' ? 'sidebarL' : 'sidebarR';
        document.getElementById(id).classList.toggle('active');
    }

    // 語音欄位拖曳實現
    function initDraggableVoice() {
        const bar = document.getElementById('dragVoice');
        let active = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;

        const dragStart = (e) => {
            if (e.target.tagName === 'BUTTON') return;
            initialX = (e.touches ? e.touches[0].clientX : e.clientX) - xOffset;
            initialY = (e.touches ? e.touches[0].clientY : e.clientY) - yOffset;
            active = true;
        };
        const dragEnd = () => { active = false; };
        const drag = (e) => {
            if (active) {
                e.preventDefault();
                currentX = (e.touches ? e.touches[0].clientX : e.clientX) - initialX;
                currentY = (e.touches ? e.touches[0].clientY : e.clientY) - initialY;
                xOffset = currentX; yOffset = currentY;
                bar.style.transform = `translate(calc(-50% + ${currentX}px), ${currentY}px)`;
            }
        };
        bar.addEventListener('mousedown', dragStart);
        window.addEventListener('mousemove', drag);
        window.addEventListener('mouseup', dragEnd);
        bar.addEventListener('touchstart', dragStart);
        window.addEventListener('touchmove', drag);
        window.addEventListener('touchend', dragEnd);
    }

    // --- 2. 戰術管理 (LocalStorage) ---
    const STORAGE_KEY = 'bboard_pro_data';
    function getTactics() { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    function updateListUI() {
        const list = document.getElementById('tacticList');
        const data = getTactics();
        list.innerHTML = Object.keys(data).length ? '' : '<div style="color:#555; text-align:center;">空</div>';
        Object.keys(data).forEach(name => {
            const div = document.createElement('div');
            div.className = 'tactic-item';
            div.innerHTML = `<span>${name}</span><span style="color:#e53e3e" onclick="deleteTactic('${name}')">✕</span>`;
            div.onclick = (e) => { if(e.target.tagName !== 'SPAN' || e.target.innerText !== '✕') loadTactic(name); };
            list.appendChild(div);
        });
    }
    function saveTacticToStorage() {
        if(frames.length < 2) return alert('請先紀錄至少兩組點位');
        const name = prompt('輸入戰術名稱：', '戰術' + Date.now().toString().slice(-4));
        if(!name) return;
        const tactics = getTactics();
        tactics[name] = { frames };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(tactics));
        updateListUI();
    }
    function loadTactic(name) {
        const tactics = getTactics();
        frames = tactics[name].frames;
        items = frames[0].map(i => ({...i}));
        // 重新關聯圖片物件
        items.forEach(it => { if(it.type==='player') it.img = playerImages.find(p => p && p.src.includes(it.imgSrc)); });
        document.getElementById('saveCount').innerText = frames.length;
        render();
        toggleSidebar('L');
    }
    function deleteTactic(name) {
        if(!confirm('刪除戰術？')) return;
        const tactics = getTactics();
        delete tactics[name];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(tactics));
        updateListUI();
    }

    // --- 3. 核心繪圖與拖曳邏輯 ---
    async function init() {
        courtImage = await new Promise(res => {
            const img = new Image(); img.crossOrigin = "anonymous";
            img.src = "https://raw.githubusercontent.com/goodskyfly-cell/BBOARD/main/basketball%20court%202%20(NEW).png";
            img.onload = () => res(img);
        });
        const names = ["01.png", "05.png", "06.png", "07.png", "08.png", "09.png", "10.png", "12.png", "13.png", "15.png", "23.png", "89.png"];
        playerImages = await Promise.all(names.map(n => new Promise(res => {
            const img = new Image(); img.crossOrigin="anonymous";
            img.src = `https://raw.githubusercontent.com/goodskyfly-cell/newboard/main/${n}`;
            img.onload = () => res(img); img.onerror = () => res(null);
        })));
        resetItems();
        initDraggableVoice();
        initDrag();
        updateListUI();
        window.addEventListener('resize', resize);
        resize();
    }

    function render(t=null, sF=null, eF=null) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if(courtImage) ctx.drawImage(courtImage, 0, 0, canvas.width, canvas.height);
        const s = canvas.width / BASE_W;
        const data = t !== null ? sF.map((it, i) => ({
            ...it, x: it.x + (eF[i].x - it.x) * t, y: it.y + (eF[i].y - it.y) * t
        })) : items;
        data.forEach(p => {
            const r = (p.type==='ball' ? 18 : 34) * s;
            const px = p.x * s, py = p.y * s;
            ctx.save();
            ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2);
            if(p.type === 'ball') {
                ctx.fillStyle = "#ff5722"; ctx.fill(); ctx.strokeStyle = "white"; ctx.lineWidth = 2*s; ctx.stroke();
            } else {
                ctx.fillStyle = "white"; ctx.fill(); ctx.clip();
                if(p.img) ctx.drawImage(p.img, px - r, py - r, r * 2, r * 2);
                ctx.strokeStyle = "rgba(255,255,255,0.8)"; ctx.lineWidth = 2*s; ctx.stroke();
            }
            ctx.restore();
        });
    }

    function initDrag() {
        const getP = (e) => {
            const r = canvas.getBoundingClientRect();
            const tx = e.touches ? e.touches[0].clientX : e.clientX;
            const ty = e.touches ? e.touches[0].clientY : e.clientY;
            const s = canvas.width / BASE_W;
            return { x: (tx - r.left) / s, y: (ty - r.top) / s };
        };
        const start = (e) => {
            const p = getP(e);
            dragTarget = items.slice().reverse().find(i => Math.hypot(i.x - p.x, i.y - p.y) < 40);
        };
        const move = (e) => {
            if(dragTarget) {
                if(e.touches) e.preventDefault();
                const p = getP(e);
                dragTarget.x = p.x; dragTarget.y = p.y;
                render();
            }
        };
        canvas.addEventListener('mousedown', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', () => dragTarget = null);
        canvas.addEventListener('touchstart', (e) => { start(e); if(dragTarget) e.preventDefault(); }, {passive:false});
        window.addEventListener('touchmove', move, {passive:false});
        window.addEventListener('touchend', () => dragTarget = null);
    }

    function resize() {
        const stage = document.getElementById('mainStage').getBoundingClientRect();
        const ratio = BASE_W / BASE_H;
        let w = stage.width, h = stage.height;
        if(w / h > ratio) { w = h * ratio; } else { h = w / ratio; }
        canvas.width = w; canvas.height = h;
        render();
    }

    // --- 操作函數 ---
    function record() { frames.push(items.map(i => ({...i, imgSrc: i.img ? i.img.src.split('/').pop() : ''}))); document.getElementById('saveCount').innerText = frames.length; }
    async function play() {
        if(frames.length < 2) return;
        for (let i = 0; i < frames.length - 1; i++) {
            for (let t = 0; t <= 1; t += 0.05) {
                render(t, frames[i], frames[i+1]);
                await new Promise(r => requestAnimationFrame(r));
            }
        }
    }
    function resetItems() {
        items = playerImages.filter(m => m).map((img, i) => ({ x: 80 + i * 75, y: 100, img, type: 'player' }));
        items.push({ x: 500, y: 286, type: 'ball' }); render();
    }
    function clearFrames() { frames = []; document.getElementById('saveCount').innerText = "0"; }
    function toggleFull() { if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }

    function initVoice() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!Speech) return;
        recognition = new Speech(); recognition.lang = 'zh-TW'; recognition.continuous = true;
        recognition.onresult = (e) => {
            let res = ""; for (let i = e.resultIndex; i < e.results.length; i++) { if(e.results[i].isFinal) res += e.results[i][0].transcript; }
            if(res) document.getElementById('v-output').value = res;
        };
        recognition.onend = () => { if(isListening) recognition.start(); };
    }
    function toggleVoice() {
        const btn = document.getElementById('v-toggle');
        if(!isListening) { recognition.start(); isListening = true; btn.innerText = "🛑 停止"; btn.classList.add('active'); }
        else { isListening = false; recognition.stop(); btn.innerText = "🎤 開始說話"; btn.classList.remove('active'); }
    }

    init();
    initVoice();
</script>
</body>
</html>
