<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>籃球戰術平台 Pro - 語音拖曳修復版</title>
    <style>
        :root { --accent: #3182ce; --bg: #000000; --panel: rgba(25, 25, 25, 0.98); --border: rgba(255,255,255,0.15); }
        body { margin: 0; padding: 0; background-color: var(--bg); overflow: hidden; height: 100vh; display: flex; font-family: -apple-system, sans-serif; color: white; }
        
        .stage { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; z-index: 1; background: #000; }
        canvas { background-color: #111; touch-action: none; cursor: crosshair; z-index: 5; }

        /* 語音欄位 - 增加拖曳優化 */
        .voice-bar { 
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 3500; /* 確保在所有介面最上方 */
            background: var(--panel); backdrop-filter: blur(15px); padding: 8px 12px; 
            border-radius: 12px; border: 1px solid var(--border); 
            display: flex; gap: 8px; align-items: center; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.5); width: 85%; max-width: 500px;
            touch-action: none; /* 關鍵：禁用瀏覽器預設手勢以便拖曳 */
        }
        
        /* 拖曳手把 */
        .drag-handle {
            cursor: move; padding: 0 10px; color: #718096; font-size: 20px;
            user-select: none; -webkit-user-drag: none;
        }

        .voice-btn { background: #805ad5; border: none; border-radius: 8px; color: white; padding: 8px 12px; cursor: pointer; font-weight: bold; font-size: 15px; white-space: nowrap; }
        .voice-btn.active { background: #f56565; animation: pulse 1.5s infinite; }
        input#v-output { flex: 1; background: #1a202c; border: 1px solid #4a5568; color: #f6e05e; padding: 8px; border-radius: 6px; outline: none; font-size: 18px; font-weight: bold; pointer-events: auto; }

        /* 側邊欄 */
        .sidebar { position: absolute; top: 0; height: 100%; background: var(--panel); transition: transform 0.3s ease; z-index: 2000; display: flex; flex-direction: column; width: 250px; }
        .sidebar-left { left: 0; transform: translateX(-250px); border-right: 1px solid var(--border); }
        .sidebar-right { right: 0; transform: translateX(250px); border-left: 1px solid var(--border); }
        .sidebar.active { transform: translateX(0); }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 20px 15px; }
        
        .tab { position: absolute; width: 40px; height: 120px; display: flex; align-items: center; justify-content: center; writing-mode: vertical-lr; cursor: pointer; font-size: 14px; font-weight: bold; color: white; }
        .left-tab { right: -41px; top: 20%; background: #3182ce; border-radius: 0 10px 10px 0; }
        .right-tab { left: -41px; top: 20%; background: #38a169; border-radius: 10px 0 0 10px; }

        .panel-btn { width: 100%; padding: 15px 10px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-bottom: 10px; font-size: 15px; text-align: left; }
        .btn-green { background: #38a169; } 
        .btn-blue { background: #3182ce; } 
        .btn-purple { background: #805ad5; } 
        .btn-gray { background: #4a5568; } 
        .btn-red { background: #e53e3e; }

        .play-controls {
            position: absolute; bottom: -100px; left: 50%; transform: translateX(-50%);
            z-index: 3000; transition: 0.4s; background: var(--panel); padding: 15px 30px; border-radius: 50px; display: flex; gap: 20px;
        }
        .play-controls.active { bottom: 30px; }
        .control-btn { border: none; border-radius: 50%; width: 60px; height: 60px; cursor: pointer; font-size: 26px; color: white; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    </style>
</head>
<body>

<div class="stage" id="mainStage">
    <div class="play-controls" id="playUI">
        <button class="control-btn" style="background:#38a169;" onclick="resumeAnim()">▶</button>
        <button class="control-btn" style="background:#ecc94b;" onclick="pauseAnim()">Ⅱ</button>
        <button class="control-btn" style="background:#e53e3e;" onclick="stopAnim()">■</button>
    </div>

    <div class="voice-bar" id="dragVoice">
        <div class="drag-handle">⠿</div>
        <button class="voice-btn" id="v-toggle" onclick="toggleVoice()">🎤 說話</button>
        <input type="text" id="v-output" placeholder="辨識結果..." readonly>
        <button style="background:#4a5568; color:white; border:none; padding:5px 10px; border-radius:5px;" onclick="document.getElementById('v-output').value=''">重設</button>
    </div>

    <div class="sidebar sidebar-left" id="sidebarL">
        <div class="tab left-tab" onclick="toggleSidebar('L')">📁 戰術清單 ◀</div>
        <div class="sidebar-content">
            <h3 style="margin-top:0;">🏀 戰術紀錄庫</h3>
            <div id="tacticList"></div>
        </div>
    </div>

    <div class="sidebar sidebar-right" id="sidebarR">
        <div class="tab right-tab" onclick="toggleSidebar('R')">⚙️ 工作面板 ◀</div>
        <div class="sidebar-content">
            <button class="panel-btn btn-green" onclick="record()">📌 紀錄目前點位</button>
            <button class="panel-btn btn-blue" onclick="startPlayProcess()">▶ 播放動畫</button>
            <button class="panel-btn btn-purple" onclick="saveTacticToStorage()">💾 儲存戰術</button>
            <button class="panel-btn btn-gray" onclick="resetItems()">🔄 重置球員</button>
            <button class="panel-btn btn-red" onclick="clearFrames()">🗑️ 清空紀錄</button>
            <button class="panel-btn btn-gray" onclick="toggleFull()">📺 全螢幕切換</button>
        </div>
    </div>

    <canvas id="court"></canvas>
</div>

<script>
    const canvas = document.getElementById('court');
    const ctx = canvas.getContext('2d');
    const BASE_W = 1000, BASE_H = 572; 
    let items = [], frames = [], playerImages = [], courtImage = null;
    let isPlaying = false;

    // --- 核心修復：強化語音列拖曳邏輯 ---
    function initDraggableVoice() {
        const bar = document.getElementById('dragVoice');
        let active = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;

        const dragStart = (e) => {
            // 只有按在 bar 本身或 drag-handle 才能啟動拖曳，按在按鈕或輸入框時維持原功能
            if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            initialX = clientX - xOffset;
            initialY = clientY - yOffset;
            active = true;
        };

        const dragEnd = () => { active = false; };

        const drag = (e) => {
            if (active) {
                e.preventDefault();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                currentX = clientX - initialX;
                currentY = clientY - initialY;
                xOffset = currentX;
                yOffset = currentY;
                // 使用 translate3d 提高渲染效能
                setTranslate(currentX, currentY, bar);
            }
        };

        function setTranslate(xPos, yPos, el) {
            el.style.transform = `translate3d(calc(-50% + ${xPos}px), ${yPos}px, 0)`;
        }

        bar.addEventListener("touchstart", dragStart, {passive: false});
        window.addEventListener("touchend", dragEnd);
        window.addEventListener("touchmove", drag, {passive: false});
        bar.addEventListener("mousedown", dragStart);
        window.addEventListener("mouseup", dragEnd);
        window.addEventListener("mousemove", drag);
    }

    // --- 其他功能函數 ---
    function toggleSidebar(dir) { document.getElementById(dir === 'L' ? 'sidebarL' : 'sidebarR').classList.toggle('active'); }
    function toggleFull() {
        const s = document.getElementById('mainStage');
        if (!document.fullscreenElement) {
            if (s.requestFullscreen) s.requestFullscreen();
            else if (s.webkitRequestFullscreen) s.webkitRequestFullscreen();
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
        }
        setTimeout(resize, 200);
    }

    async function init() {
        courtImage = await new Promise(res => {
            const img = new Image(); img.crossOrigin = "anonymous";
            img.src = "https://raw.githubusercontent.com/goodskyfly-cell/BBOARD/main/basketball%20court%202%20(NEW).png";
            img.onload = () => res(img);
        });
        const names = ["01.png", "05.png", "06.png", "07.png", "08.png", "09.png", "10.png", "12.png", "13.png", "15.png", "23.png", "89.png"];
        playerImages = await Promise.all(names.map(n => new Promise(res => {
            const img = new Image(); img.crossOrigin="anonymous";
            img.src = `https://raw.githubusercontent.com/goodskyfly-cell/newboard/main/${n}`;
            img.onload = () => res(img);
        })));
        resetItems();
        initDrag();
        initDraggableVoice(); // 啟用修復後的拖曳功能
        window.addEventListener('resize', resize);
        resize();
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if(courtImage) ctx.drawImage(courtImage, 0, 0, canvas.width, canvas.height);
        const s = canvas.width / BASE_W;
        items.forEach(p => {
            const r = (p.type==='ball' ? 18 : 34) * s;
            const px = p.x * s, py = p.y * s;
            ctx.save(); ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2);
            if(p.type === 'ball') { ctx.fillStyle = "#ff5722"; ctx.fill(); ctx.strokeStyle = "white"; ctx.lineWidth = 2*s; ctx.stroke(); } 
            else { ctx.fillStyle = "white"; ctx.fill(); ctx.clip(); if(p.img) ctx.drawImage(p.img, px-r, py-r, r*2, r*2); ctx.strokeStyle = "rgba(255,255,255,0.8)"; ctx.lineWidth = 2*s; ctx.stroke(); }
            ctx.restore();
        });
    }

    function resize() {
        const stage = document.getElementById('mainStage').getBoundingClientRect();
        const ratio = BASE_W / BASE_H;
        let w = stage.width, h = stage.height;
        if(w / h > ratio) w = h * ratio; else h = w / ratio;
        canvas.width = w; canvas.height = h;
        render();
    }

    let dragTarget = null;
    function initDrag() {
        const getP = (e) => {
            const r = canvas.getBoundingClientRect();
            const tx = e.touches ? e.touches[0].clientX : e.clientX;
            const ty = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (tx - r.left) / (canvas.width / BASE_W), y: (ty - r.top) / (canvas.width / BASE_W) };
        };
        canvas.addEventListener('mousedown', (e) => { const p = getP(e); dragTarget = items.slice().reverse().find(i => Math.hypot(i.x - p.x, i.y - p.y) < 40); });
        window.addEventListener('mousemove', (e) => { if(dragTarget) { const p = getP(e); dragTarget.x = p.x; dragTarget.y = p.y; render(); }});
        window.addEventListener('mouseup', () => dragTarget = null);
        canvas.addEventListener('touchstart', (e) => { const p = getP(e.touches[0]); dragTarget = items.slice().reverse().find(i => Math.hypot(i.x - p.x, i.y - p.y) < 40); if(dragTarget) e.preventDefault(); }, {passive:false});
        window.addEventListener('touchmove', (e) => { if(dragTarget) { e.preventDefault(); const p = getP(e.touches[0]); dragTarget.x = p.x; dragTarget.y = p.y; render(); }}, {passive:false});
        window.addEventListener('touchend', () => dragTarget = null);
    }

    function resetItems() { items = playerImages.map((img, i) => ({ x: 80 + i * 75, y: 100, img, type: 'player' })); items.push({ x: 500, y: 286, type: 'ball' }); render(); }
    
    // (省略其餘戰術儲存與動畫邏輯，維持前版本功能...)
    init();
</script>
</body>
</html>
