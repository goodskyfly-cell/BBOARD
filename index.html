<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>籃球戰術平台 Pro - 穩定線條與自適應版</title>
    <style>
        /* 全域佈局：防止滾動並強制滿版 */
        body { 
            margin: 0; padding: 0; background-color: #1a202c; 
            font-family: sans-serif; overflow: hidden; height: 100vh; 
            display: flex; flex-direction: column; 
        }

        .header-info { 
            color: #f6e05e; font-weight: bold; text-align: center; 
            padding: 8px; font-size: 1rem; background: #2d3748;
        }

        /* 畫布容器：自動填滿剩餘空間，確保不擠壓按鈕 */
        .canvas-area {
            flex: 1; display: flex; align-items: center; justify-content: center;
            width: 100%; overflow: hidden; position: relative;
        }

        canvas { 
            background-color: #f39c12; border: 2px solid #5d3a1a; 
            touch-action: none; cursor: crosshair; 
            max-width: 98%; max-height: 95%; /* 確保畫布在容器內 */
        }

        /* 底部按鈕區：強制固定在最下方 */
        .controls-row { 
            padding: 12px; display: flex; gap: 8px; flex-wrap: wrap; 
            justify-content: center; background: #2d3748; width: 100%;
            border-top: 1px solid #4a5568; z-index: 100;
        }

        button { 
            padding: 10px 16px; border-radius: 8px; border: none; 
            font-weight: bold; cursor: pointer; font-size: 0.9rem; 
            transition: 0.2s; display: flex; align-items: center; gap: 4px;
        }
        .btn-save { background: #d69e2e; color: white; }
        .btn-play { background: #38a169; color: white; }
        .btn-stop { background: #e53e3e; color: white; }
        .btn-full { background: #4a5568; color: white; }
        .btn-reset { background: #718096; color: white; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="header-info">已儲存點位：0/20</div>

<div class="canvas-area">
    <canvas id="courtCanvas" width="900" height="660"></canvas>
</div>

<div class="controls-row">
    <button id="save-btn" class="btn-save">📌 儲存點位</button>
    <button id="play-btn" class="btn-play">▶️ 播放動畫</button>
    <button id="stop-btn" class="btn-stop">⏹️ 停止</button>
    <button id="reset-btn" class="btn-reset">🔄 重置位置</button>
    <button id="full-btn" class="btn-full">📺 全螢幕模式</button>
</div>

<script>
    const canvas = document.getElementById('courtCanvas');
    const ctx = canvas.getContext('2d');
    
    // 設定原始座標基準
    const BASE_W = 900;
    const BASE_H = 660; 
    const COURT_W = 840; // 28公尺 * 30倍
    const COURT_H = 450; // 15公尺 * 30倍
    const PLAYER_R = 25;

    // 球員頭像清單
    const imgNames = ["01.png", "05.png", "06.png", "07.png", "08.png", "09.png", "10.png", "12.png", "13.png", "15.png", "23.png", "89.png"];
    const imgUrls = imgNames.map(name => `https://raw.githubusercontent.com/goodskyfly-cell/newboard/main/${name}`);

    let items = [], images = [], dragTarget = null;

    async function init() {
        images = await Promise.all(imgUrls.map(url => new Promise(res => {
            const img = new Image(); img.crossOrigin = "anonymous"; img.src = url;
            img.onload = () => res(img); img.onerror = () => res(null);
        })));
        resetItems();
    }

    function resetItems() {
        items = [];
        const startX = 60;
        const spacing = (BASE_W - 120) / (images.length - 1);
        // 將球員初始排列在畫布最下方的「預備區」
        images.forEach((img, i) => {
            if(img) items.push({ x: startX + i * spacing, y: 580, img: img, type: 'player' });
        });
        items.push({ x: 450, y: 225, type: 'ball' });
        render();
    }

    // 穩定版：專業球場線條繪製
    function drawCourt(scale, ox, oy) {
        ctx.strokeStyle = "white";
        ctx.lineWidth = 3 * scale;
        const cw = COURT_W * scale, ch = COURT_H * scale;
        const leftX = ox + (BASE_W * scale - cw) / 2;
        const topY = oy + 30 * scale;

        // 1. 外框
        ctx.strokeRect(leftX, topY, cw, ch);
        // 2. 中線與中圈
        ctx.beginPath();
        ctx.moveTo(leftX + cw/2, topY); ctx.lineTo(leftX + cw/2, topY + ch);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(leftX + cw/2, topY + ch/2, 1.8 * 30 * scale, 0, Math.PI * 2);
        ctx.stroke();

        // 3. 兩側細節 (三分線、禁區)
        [0, 1].forEach(side => {
            const sideX = side === 0 ? leftX : leftX + cw;
            const dir = side === 0 ? 1 : -1;
            const centerY = topY + ch/2;
            
            // 三分線 (精確直線與弧線連接)
            const r3 = 6.75 * 30 * scale;
            const intersectY = 0.9 * 30 * scale;
            ctx.beginPath();
            ctx.moveTo(sideX, centerY - (ch/2 - intersectY));
            ctx.lineTo(sideX + dir * 1.575 * 30 * scale, centerY - (ch/2 - intersectY));
            ctx.arc(sideX + dir * 1.575 * 30 * scale, centerY, r3, side === 0 ? -1.2 : 1.95, side === 0 ? 1.2 : 4.33, side !== 0);
            ctx.lineTo(sideX, centerY + (ch/2 - intersectY));
            ctx.stroke();

            // 禁區
            const keyW = 5.8 * 30 * scale, keyH = 4.9 * 30 * scale;
            ctx.strokeRect(side === 0 ? sideX : sideX - keyW, centerY - keyH/2, keyW, keyH);
        });
    }

    function render() {
        const w = canvas.width, h = canvas.height;
        ctx.clearRect(0, 0, w, h);
        const scale = Math.min(w / BASE_W, h / BASE_H);
        const ox = (w - BASE_W * scale) / 2;
        const oy = (h - BASE_H * scale) / 2;

        drawCourt(scale, ox, oy);

        items.forEach(p => {
            const dx = p.x * scale + ox, dy = p.y * scale + oy, r = PLAYER_R * scale;
            ctx.save();
            if(p.type === 'ball') {
                ctx.beginPath(); ctx.arc(dx, dy, r * 0.6, 0, Math.PI * 2);
                ctx.fillStyle = "#ff4500"; ctx.fill(); ctx.stroke();
            } else {
                ctx.beginPath(); ctx.arc(dx, dy, r, 0, Math.PI * 2);
                ctx.fillStyle = "white"; ctx.fill(); ctx.clip();
                if(p.img) ctx.drawImage(p.img, dx - r, dy - r, r * 2, r * 2);
                ctx.restore();
                ctx.lineWidth = 2 * scale; ctx.strokeStyle = "#333";
                ctx.beginPath(); ctx.arc(dx, dy, r, 0, Math.PI * 2); ctx.stroke();
            }
            ctx.restore();
        });
    }

    // 精確座標轉換
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        const scale = Math.min(canvas.width / BASE_W, canvas.height / BASE_H);
        const ox = (canvas.width - BASE_W * scale) / 2;
        const oy = (canvas.height - BASE_H * scale) / 2;
        return {
            x: ((cx - rect.left) * (canvas.width / rect.width) - ox) / scale,
            y: ((cy - rect.top) * (canvas.height / rect.height) - oy) / scale
        };
    }

    const start = e => {
        const p = getPos(e);
        for(let i = items.length - 1; i >= 0; i--) {
            if(Math.hypot(items[i].x - p.x, items[i].y - p.y) < PLAYER_R + 10) {
                dragTarget = items[i];
                if(e.touches) e.preventDefault();
                break;
            }
        }
    };

    const move = e => {
        if(dragTarget) {
            const p = getPos(e);
            dragTarget.x = p.x; dragTarget.y = p.y;
            render();
            if(e.touches) e.preventDefault();
        }
    };

    canvas.addEventListener('mousedown', start);
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', () => dragTarget = null);
    canvas.addEventListener('touchstart', start, {passive: false});
    window.addEventListener('touchmove', move, {passive: false});
    window.addEventListener('touchend', () => dragTarget = null);

    document.getElementById('full-btn').onclick = () => {
        if (!document.fullscreenElement) canvas.requestFullscreen();
        else document.exitFullscreen();
    };

    document.getElementById('reset-btn').onclick = resetItems;

    // 自適應調整
    function autoResize() {
        if(document.fullscreenElement) {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        } else {
            canvas.width = BASE_W;
            canvas.height = BASE_H;
        }
        render();
    }

    window.addEventListener('resize', autoResize);
    document.addEventListener('fullscreenchange', autoResize);

    init();
</script>
</body>
</html>
