<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>籃球戰術平台 Pro - 極大化版</title>
    <style>
        body { margin: 0; padding: 0; background-color: #1a202c; font-family: sans-serif; height: 100vh; overflow: hidden; color: white; }
        
        /* 側邊戰術庫 - 隱藏抽屜 */
        .sidebar { 
            position: fixed; left: -260px; top: 0; width: 260px; height: 100%; 
            background: #2d3748; z-index: 2000; transition: 0.3s; 
            display: flex; flex-direction: column; padding: 20px; box-sizing: border-box;
            border-right: 2px solid #4a5568;
        }
        .sidebar.active { left: 0; }
        .sidebar-toggle { 
            position: fixed; left: 10px; top: 10px; z-index: 2100; 
            background: rgba(49, 130, 206, 0.8); border: none; color: white; 
            padding: 10px; border-radius: 5px; cursor: pointer;
        }

        /* 主畫面佈局 */
        .main-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        /* 畫布區域極大化 */
        .canvas-area { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #1a202c; }
        canvas { background-color: #f39c12; cursor: crosshair; touch-action: none; }

        /* 底部語音框 */
        .bottom-voice-bar { 
            background: #2d3748; padding: 10px; display: flex; justify-content: center; align-items: center;
            border-top: 1px solid #4a5568; height: 60px;
        }
        .voice-box { width: 90%; background: #1a202c; padding: 8px 15px; border-radius: 20px; color: #a0aec0; font-size: 0.9rem; }

        /* 懸浮控制項 - 隱藏在底部邊緣 */
        .floating-controls { 
            position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; background: rgba(0,0,0,0.6); padding: 8px; border-radius: 12px;
            z-index: 1500; opacity: 0.3; transition: opacity 0.3s;
        }
        .floating-controls:hover { opacity: 1; }

        button { border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; padding: 8px 15px; font-size: 0.85rem; }
        .btn-orange { background: #d69e2e; }
        .btn-green { background: #38a169; }
        .btn-red { background: #e53e3e; }
        .btn-blue { background: #3182ce; }
        .btn-gray { background: #718096; }
    </style>
</head>
<body>

<button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('active')">📁 戰術庫</button>

<div class="sidebar" id="sidebar">
    <h3>📁 戰術儲存庫</h3>
    <div id="tactic-list" style="flex:1; border:1px solid #4a5568; margin-bottom:15px; border-radius:5px; padding:10px;">
        <p style="color:#718096; text-align:center;">尚無存檔</p>
    </div>
    <button class="btn-blue" style="width:100%">💾 儲存目前戰術</button>
</div>

<div class="main-container">
    <div class="canvas-area" id="canvas-wrap">
        <canvas id="courtCanvas"></canvas>
    </div>
    
    <div class="floating-controls">
        <button class="btn-orange" id="mark-btn">📌 紀錄</button>
        <button class="btn-green" id="play-btn">▶️ 播放</button>
        <button class="btn-red" id="stop-btn">⏹️ 停止</button>
        <button class="btn-gray" id="reset-btn">🔄 重置</button>
        <button class="btn-blue" id="full-btn">📺 全螢幕</button>
    </div>

    <div class="bottom-voice-bar">
        <div class="voice-box">🎤 等待語音指令中...</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('courtCanvas');
    const ctx = canvas.getContext('2d');
    const wrap = document.getElementById('canvas-wrap');

    const BASE_W = 900, BASE_H = 660, COURT_H = 600;
    let items = [], images = [], scaleRatio = 1, dragTarget = null;

    const imgNames = ["01.png", "05.png", "06.png", "07.png", "08.png", "09.png", "10.png", "12.png", "13.png", "15.png", "23.png", "89.png"];
    const imgUrls = imgNames.map(name => `https://raw.githubusercontent.com/goodskyfly-cell/newboard/main/${name}`);

    async function init() {
        images = await Promise.all(imgUrls.map(url => new Promise(res => {
            const img = new Image(); img.crossOrigin = "anonymous"; img.src = url;
            img.onload = () => res(img); img.onerror = () => res(null);
        })));
        resetPlayers();
        window.addEventListener('resize', render);
        render();
    }

    function resetPlayers() {
        items = [];
        images.forEach((img, i) => { if(img) items.push({ x: 50 + i * 72, y: 625, img: img, type: 'player' }); });
        items.push({ x: 450, y: 300, type: 'ball' });
    }

    // --- 關鍵修正：完全回歸原始球場線條邏輯 ---
    function drawCourtLines(s) {
        ctx.save();
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2.5 * s;

        const pad = 20 * s;
        const cw = 860 * s;
        const ch = 560 * s;

        // 1. 外框
        ctx.strokeRect(pad, pad, cw, ch);

        // 2. 中線與中圈
        ctx.beginPath();
        ctx.moveTo(450 * s, pad);
        ctx.lineTo(450 * s, pad + ch);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(450 * s, 300 * s, 60 * s, 0, Math.PI * 2);
        ctx.stroke();

        // 3. 原始三分線與禁區 (左右對稱)
        [true, false].forEach(isLeft => {
            const sideX = isLeft ? pad : pad + cw;
            const dir = isLeft ? 1 : -1;

            // 三分線弧度 (恢復原始半徑)
            ctx.beginPath();
            ctx.arc(sideX + dir * 60 * s, 300 * s, 230 * s, (isLeft ? -1.22 : 1.92), (isLeft ? 1.22 : 4.36));
            ctx.stroke();

            // 禁區恢復 (原始長方形比例)
            ctx.strokeRect(isLeft ? pad : pad + cw - 170 * s, 210 * s, 170 * s, 180 * s);
            
            // 籃框位置參考點
            ctx.beginPath();
            ctx.arc(sideX + dir * 50 * s, 300 * s, 8 * s, 0, Math.PI * 2);
            ctx.stroke();
        });
        ctx.restore();
    }

    function render() {
        // 畫布最大化計算
        const winW = wrap.clientWidth - 20;
        const winH = wrap.clientHeight - 20;
        scaleRatio = Math.min(winW / BASE_W, winH / BASE_H);
        
        canvas.width = BASE_W * scaleRatio;
        canvas.height = BASE_H * scaleRatio;

        // 渲染背景與球場
        ctx.fillStyle = "#f39c12";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drawCourtLines(scaleRatio);

        // 渲染球員與球
        const radius = 24 * scaleRatio;
        items.forEach(p => {
            const dx = p.x * scaleRatio, dy = p.y * scaleRatio;
            ctx.save();
            if(p.type === 'ball') {
                ctx.beginPath(); ctx.arc(dx, dy, radius * 0.6, 0, Math.PI * 2);
                ctx.fillStyle = "#ff4500"; ctx.fill(); ctx.strokeStyle = "black"; ctx.stroke();
            } else {
                ctx.beginPath(); ctx.arc(dx, dy, radius, 0, Math.PI * 2);
                ctx.fillStyle = "white"; ctx.fill(); ctx.clip();
                if(p.img) ctx.drawImage(p.img, dx - radius, dy - radius, radius * 2, radius * 2);
                ctx.restore();
                ctx.beginPath(); ctx.arc(dx, dy, radius, 0, Math.PI * 2);
                ctx.strokeStyle = "#333"; ctx.lineWidth = 2 * scaleRatio; ctx.stroke();
            }
            ctx.restore();
        });
    }

    // 交互與全螢幕
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const ev = e.touches ? e.touches[0] : e;
        return { x: (ev.clientX - rect.left) / scaleRatio, y: (ev.clientY - rect.top) / scaleRatio };
    }

    canvas.addEventListener('mousedown', e => {
        const p = getPos(e);
        dragTarget = items.findLast(i => Math.hypot(i.x - p.x, i.y - p.y) < 30);
    });
    window.addEventListener('mousemove', e => {
        if(!dragTarget) return;
        const p = getPos(e);
        dragTarget.x = p.x; dragTarget.y = p.y;
        render();
    });
    window.addEventListener('mouseup', () => dragTarget = null);

    document.getElementById('full-btn').onclick = () => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    };
    document.getElementById('reset-btn').onclick = () => { resetPlayers(); render(); };

    init();
</script>
</body>
</html>
