<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>籃球戰術板 Pro - 載入吸附修正版</title>
    <style>
        :root { 
            --panel: rgba(25, 25, 25, 0.98); 
            --border: rgba(255,255,255,0.15); 
            --accent-blue: #3182ce;
            --accent-green: #38a169;
            --accent-purple: #805ad5;
            --accent-red: #e53e3e;
            --accent-orange: #dd6b20;
        }
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; height: 100vh; display: flex; flex-direction: column; font-family: -apple-system, sans-serif; color: white; }
        .mode-tabs { display: flex; background: #1a202c; border-bottom: 1px solid var(--border); z-index: 5000; }
        .mode-tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-weight: bold; color: #718096; }
        .mode-tab.active { color: white; border-bottom: 3px solid var(--accent-blue); background: rgba(255,255,255,0.1); }
        .stage { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; background: #111; }
        .canvas-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        canvas { position: absolute; touch-action: none; }
        #court { z-index: 5; }
        #drawingCanvas { z-index: 10; pointer-events: none; }
        #drawingCanvas.active { pointer-events: auto; cursor: crosshair; }
        .sidebar { position: absolute; top: 0; height: 100%; background: var(--panel); transition: 0.3s ease; z-index: 4000; width: 260px; display: flex; flex-direction: column; }
        .sidebar-left { left: -260px; border-right: 1px solid var(--border); }
        .sidebar-right { right: -260px; border-left: 1px solid var(--border); }
        .sidebar.active { transform: translateX(0); }
        .sidebar-left.active { left: 0; }
        .sidebar-right.active { right: 0; }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
        .tab { position: absolute; width: 42px; height: 100px; display: flex; align-items: center; justify-content: center; writing-mode: vertical-lr; cursor: pointer; color: white; font-weight: bold; top: 20%; }
        .left-tab { right: -42px; background: var(--accent-blue); border-radius: 0 10px 10px 0; }
        .right-tab { left: -42px; background: var(--accent-green); border-radius: 10px 0 0 10px; }
        .panel-btn { width: 100%; padding: 8px 10px; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-green { background: var(--accent-green); }
        .btn-blue { background: var(--accent-blue); }
        .btn-gray { background: #4a5568; }
        .btn-red { background: var(--accent-red); }
        .btn-purple { background: var(--accent-purple); }
        .btn-orange { background: var(--accent-orange); }
        .tool-active { outline: 2px solid white; background: var(--accent-purple) !important; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .play-controls-wrapper { position: absolute; bottom: -250px; left: 50%; transform: translateX(-50%); z-index: 10000; transition: bottom 0.4s; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .play-controls-wrapper.active { bottom: 30px; }
        .speed-panel { background: var(--panel); padding: 5px 20px; border-radius: 20px; border: 1px solid var(--border); display: flex; align-items: center; gap: 10px; font-size: 12px; }
        .speed-slider { cursor: pointer; accent-color: var(--accent-blue); width: 100px; }
        .play-bar { background: var(--panel); padding: 12px 25px; border-radius: 40px; display: flex; align-items: center; gap: 15px; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .ctrl-btn { border: none; border-radius: 50%; width: 42px; height: 42px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .tactic-item { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 6px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .tactic-name { font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px; }
    </style>
</head>
<body>

<div class="mode-tabs">
    <div class="mode-tab active" id="tab-basic" onclick="switchMode('basic')">基本模式</div>
    <div class="mode-tab" id="tab-advanced" onclick="switchMode('advanced')">專業模式</div>
</div>

<div class="stage">
    <div class="canvas-container" id="canvasHolder">
        <canvas id="court"></canvas>
        <canvas id="drawingCanvas"></canvas>
    </div>
    <div class="play-controls-wrapper" id="playUI">
        <div class="speed-panel">
            <span>播放速度：</span>
            <input type="range" class="speed-slider" id="speedCtrl" min="0.01" max="0.1" step="0.01" value="0.04" oninput="updateSpeedDisp()">
            <span id="speedVal">1.0x</span>
        </div>
        <div class="play-bar">
            <button class="ctrl-btn" style="background:var(--accent-green);" onclick="resumeAnim()">▶</button>
            <button class="ctrl-btn" style="background:#ecc94b;" onclick="pauseAnim()">Ⅱ</button>
            <button class="ctrl-btn" style="background:var(--accent-red);" onclick="stopAnim()">■</button>
        </div>
    </div>
    <div class="sidebar sidebar-left" id="sidebarL">
        <div class="tab left-tab" onclick="toggleSidebar('L')">戰術庫 ◀</div>
        <div class="sidebar-content">
            <p style="text-align:center; color:#aaa; font-size:12px; margin: 5px 0;">已儲存戰術</p>
            <div id="tacticList"></div>
        </div>
    </div>
    <div class="sidebar sidebar-right" id="sidebarR">
        <div class="tab right-tab" onclick="toggleSidebar('R')">工具面板 ◀</div>
        <div class="sidebar-content">
            <button class="panel-btn btn-purple" onclick="toggleFullScreen()">📺 全螢幕切換</button>
            <hr style="border:0; border-top:1px solid var(--border); margin: 2px 0;">
            <div id="mode-desc" style="font-size: 12px; color: #3182ce; padding: 4px; background: rgba(49,130,206,0.1); border-radius: 4px;"></div>
            <button class="panel-btn btn-green" onclick="record()">📌 紀錄步驟 (紀錄後清空畫線)</button>
            <div style="text-align:center; padding: 4px; background: rgba(255,255,255,0.05); border-radius: 4px; font-size:13px;">
                暫存步數：<span id="fCount" style="font-weight:bold; color:var(--accent-green);">0</span>
            </div>
            <button class="panel-btn btn-orange" onclick="saveToLibrary()">💾 儲存此戰術到左側</button>
            <hr style="border:0; border-top:1px solid var(--border); margin: 2px 0;">
            <div class="btn-row">
                <button id="drawBtn" class="panel-btn btn-gray" onclick="toggleDrawMode()">🎨 黑色畫筆</button>
                <button class="panel-btn btn-red" onclick="clearDrawing()">🧹 清除畫線</button>
            </div>
            <hr style="border:0; border-top:1px solid var(--border); margin: 2px 0;">
            <button class="panel-btn btn-blue" onclick="startPlay()">🎬 播放戰術動畫</button>
            <button class="panel-btn btn-gray" onclick="resetItems()">🔄 重置位置</button>
            <button class="panel-btn btn-red" onclick="clearFrames()">🗑️ 清空紀錄步數</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('court');
    const ctx = canvas.getContext('2d');
    const dCanvas = document.getElementById('drawingCanvas');
    const dCtx = dCanvas.getContext('2d');
    const BASE_W = 1000, BASE_H = 572;
    
    let players = [], slots = [], ball = {x:500, y:286};
    let frames = [], playerImages = [], courtImg = null;
    let isPlaying = false, isPaused = false, currentFrame = 0, t = 0;
    let isDrawingMode = false, isDrawing = false;
    let currentMode = 'basic';
    let savedTactics = [];
    let playSpeed = 0.04;

    async function init() {
        try {
            courtImg = await loadImage("https://raw.githubusercontent.com/goodskyfly-cell/BBOARD/main/basketball%20court%202%20(NEW).png");
            const names = ["01.png", "05.png", "06.png", "07.png", "08.png", "09.png", "10.png", "12.png", "13.png", "15.png", "23.png", "89.png"];
            playerImages = await Promise.all(names.map(n => loadImage(`https://raw.githubusercontent.com/goodskyfly-cell/newboard/main/${n}`)));
            window.addEventListener('resize', resize);
            resize();
            switchMode('basic');
            setupEvents();
            updateTacticList();
        } catch (e) { console.error(e); }
    }

    function loadImage(src) { 
        return new Promise((res, rej) => { 
            const img = new Image(); img.crossOrigin = "anonymous"; img.src = src; 
            img.onload = () => res(img); img.onerror = () => rej(src);
        }); 
    }

    function resize() {
        const holder = document.getElementById('canvasHolder');
        const ratio = BASE_W / BASE_H;
        let w = holder.clientWidth, h = holder.clientHeight;
        if (w / h > ratio) w = h * ratio; else h = w / ratio;
        canvas.width = dCanvas.width = w; canvas.height = dCanvas.height = h;
        render();
    }

    function resetItems() {
        players = []; slots = [];
        for (let i = 0; i < 12; i++) {
            players.push({ x: 80 + (i % 6) * 110, y: i < 6 ? 90 : 200, imgIndex: i, bindSlot: null });
        }
        if (currentMode === 'advanced') {
            for (let i = 0; i < 5; i++) {
                slots.push({ x: 250 + i * 160, y: 380, id: i });
            }
        }
        ball = {x: 500, y: 286};
        clearDrawing();
        render();
    }

    function render() {
        if (!courtImg) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(courtImg, 0, 0, canvas.width, canvas.height);
        const s = canvas.width / BASE_W;

        if (currentMode === 'advanced') {
            slots.forEach(sl => {
                ctx.beginPath();
                ctx.arc(sl.x * s, sl.y * s, 30 * s, 0, Math.PI * 2);
                ctx.strokeStyle = "rgba(49, 130, 206, 0.8)"; 
                ctx.setLineDash([5, 5]); ctx.lineWidth = 3; ctx.stroke();
                ctx.setLineDash([]); ctx.fillStyle = "rgba(49, 130, 206, 0.15)"; ctx.fill();
            });
        }

        players.forEach(p => {
            const r = 25.5 * s;
            ctx.save();
            ctx.beginPath(); ctx.arc(p.x * s, p.y * s, r, 0, Math.PI * 2); ctx.fillStyle = "#333"; ctx.fill(); ctx.clip();
            if (playerImages[p.imgIndex]) ctx.drawImage(playerImages[p.imgIndex], (p.x - 25.5) * s, (p.y - 25.5) * s, 51 * s, 51 * s);
            ctx.restore(); 
            ctx.beginPath(); ctx.arc(p.x * s, p.y * s, r, 0, Math.PI * 2);
            ctx.strokeStyle = (p.bindSlot !== null && currentMode === 'advanced') ? "#38a169" : "white";
            ctx.lineWidth = 2.5; ctx.stroke();
        });

        const br = 18 * s;
        ctx.beginPath(); ctx.arc(ball.x * s, ball.y * s, br, 0, Math.PI * 2);
        ctx.fillStyle = "#ff5722"; ctx.fill(); ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
    }

    function setupEvents() {
        let target = null;
        const getXY = (e) => {
            const rect = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (cx - rect.left) * (BASE_W / canvas.width), y: (cy - rect.top) * (BASE_W / canvas.width) };
        };
        const start = (e) => {
            if (isPlaying) return;
            const pos = getXY(e);
            if (isDrawingMode) { dCtx.beginPath(); dCtx.moveTo(pos.x * (canvas.width/BASE_W), pos.y * (canvas.width/BASE_W)); isDrawing = true; return; }
            target = [ball, ...players, ...slots].reverse().find(it => Math.hypot(it.x - pos.x, it.y - pos.y) < 30);
        };
        const move = (e) => {
            if (!target && !isDrawing) return;
            if (e.cancelable) e.preventDefault();
            const pos = getXY(e);
            if (isDrawingMode) {
                dCtx.lineTo(pos.x * (canvas.width/BASE_W), pos.y * (canvas.width/BASE_W));
                dCtx.strokeStyle = "#000000"; dCtx.lineWidth = 4; dCtx.lineCap="round"; dCtx.stroke();
            } else {
                target.x = pos.x; target.y = pos.y;
                if (currentMode === 'advanced' && players.includes(target)) {
                    const near = slots.find(sl => Math.hypot(sl.x - pos.x, sl.y - pos.y) < 30);
                    target.bindSlot = near ? near.id : null;
                }
                render();
            }
        };
        const end = () => { 
            // 結束拖曳時，如果是專業模式且有吸附，強制對準中心
            if (target && players.includes(target) && target.bindSlot !== null) {
                const sl = slots.find(s => s.id === target.bindSlot);
                if (sl) { target.x = sl.x; target.y = sl.y; }
            }
            target = null; isDrawing = false; render(); 
        };
        const el = document.getElementById('canvasHolder');
        el.addEventListener('mousedown', start); window.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
        el.addEventListener('touchstart', start, {passive:false}); window.addEventListener('touchmove', move, {passive:false}); window.addEventListener('touchend', end);
    }

    function record() {
        const drawData = dCanvas.toDataURL();
        frames.push({ 
            players: JSON.parse(JSON.stringify(players)), 
            slots: JSON.parse(JSON.stringify(slots)), 
            ball: JSON.parse(JSON.stringify(ball)), 
            drawing: drawData 
        });
        document.getElementById('fCount').innerText = frames.length;
        clearDrawing();
    }

    function saveToLibrary() {
        if (frames.length === 0) return alert("請先紀錄步驟！");
        const name = prompt("請輸入戰術名稱：", "戰術 " + (savedTactics.length + 1));
        if (name) {
            savedTactics.push({ name: name, data: JSON.parse(JSON.stringify(frames)) });
            updateTacticList();
        }
    }

    // --- 關鍵修正：載入戰術後重新掃描吸附關係 ---
    function loadTactic(index) {
        frames = JSON.parse(JSON.stringify(savedTactics[index].data));
        document.getElementById('fCount').innerText = frames.length;
        
        const first = frames[0];
        players = JSON.parse(JSON.stringify(first.players));
        slots = JSON.parse(JSON.stringify(first.slots));
        ball = JSON.parse(JSON.stringify(first.ball));

        // 恢復吸附邏輯
        if (currentMode === 'advanced') {
            players.forEach(p => {
                const near = slots.find(sl => Math.hypot(sl.x - p.x, sl.y - p.y) < 30);
                p.bindSlot = near ? near.id : null;
                if (near) { p.x = near.x; p.y = near.y; } // 對齊
            });
        }

        if(first.drawing) drawSavedLine(first.drawing); else clearDrawing();
        render();
        alert(`已載入「${savedTactics[index].name}」`);
    }

    function drawSavedLine(dataUrl) {
        const img = new Image();
        img.src = dataUrl;
        img.onload = () => { clearDrawing(); dCtx.drawImage(img, 0, 0, dCanvas.width, dCanvas.height); };
    }

    function animate() {
        if (!isPlaying || isPaused) return;
        const cur = frames[currentFrame], nxt = frames[currentFrame+1];
        if (t === 0 && cur.drawing) { drawSavedLine(cur.drawing); }
        if (nxt) {
            if (currentMode === 'basic') {
                players.forEach((p, i) => {
                    p.x = cur.players[i].x + (nxt.players[i].x - cur.players[i].x) * t;
                    p.y = cur.players[i].y + (nxt.players[i].y - cur.players[i].y) * t;
                });
            } else {
                slots.forEach((sl, i) => {
                    sl.x = cur.slots[i].x + (nxt.slots[i].x - cur.slots[i].x) * t;
                    sl.y = cur.slots[i].y + (nxt.slots[i].y - cur.slots[i].y) * t;
                });
                players.forEach(p => { if (p.bindSlot !== null) { const sl = slots.find(s => s.id === p.bindSlot); if(sl) { p.x = sl.x; p.y = sl.y; } } });
            }
            ball.x = cur.ball.x + (nxt.ball.x - cur.ball.x) * t;
            ball.y = cur.ball.y + (nxt.ball.y - cur.ball.y) * t;
            t += playSpeed; render();
            if (t >= 1) { t = 0; currentFrame++; }
            requestAnimationFrame(animate);
        } else { isPlaying = false; }
    }

    function startPlay() {
        if (frames.length < 1) return alert("暫存中沒有步數");
        isPlaying = true; currentFrame = 0; t = 0;
        document.getElementById('playUI').classList.add('active');
        requestAnimationFrame(animate);
    }

    function updateTacticList() {
        const list = document.getElementById('tacticList');
        list.innerHTML = "";
        savedTactics.forEach((t, i) => {
            const item = document.createElement('div');
            item.className = 'tactic-item';
            item.innerHTML = `
                <span class="tactic-name">${t.name}</span>
                <div style="display:flex; gap:4px;">
                    <button class="panel-btn btn-blue" style="padding:4px 8px; font-size:11px;" onclick="loadTactic(${i})">載入</button>
                    <button class="panel-btn btn-red" style="padding:4px 8px; font-size:11px;" onclick="deleteTactic(${i})">刪除</button>
                </div>
            `;
            list.appendChild(item);
        });
    }

    function deleteTactic(index) { if(confirm("確定刪除？")) { savedTactics.splice(index, 1); updateTacticList(); } }
    function toggleSidebar(dir) {
        const sb = document.getElementById('sidebar' + dir);
        sb.classList.toggle('active');
        const tab = sb.querySelector('.tab');
        if (dir === 'L') tab.innerText = sb.classList.contains('active') ? "戰術庫 ▶" : "戰術庫 ◀";
        else tab.innerText = sb.classList.contains('active') ? "工具面板 ▶" : "工具面板 ◀";
    }
    function updateSpeedDisp() { playSpeed = parseFloat(document.getElementById('speedCtrl').value); document.getElementById('speedVal').innerText = (playSpeed / 0.04).toFixed(1) + "x"; }
    function clearDrawing() { dCtx.clearRect(0,0,dCanvas.width,dCanvas.height); }
    function switchMode(m) { currentMode = m; document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active')); document.getElementById('tab-' + m).classList.add('active'); document.getElementById('mode-desc').innerText = m === 'basic' ? "💡 模式：自由移動" : "💡 模式：對位藍圈"; clearFrames(); resetItems(); }
    function toggleDrawMode() { isDrawingMode = !isDrawingMode; document.getElementById('drawBtn').classList.toggle('tool-active', isDrawingMode); document.getElementById('drawingCanvas').classList.toggle('active', isDrawingMode); }
    function toggleFullScreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
    function stopAnim() { isPlaying = false; document.getElementById('playUI').classList.remove('active'); resetItems(); }
    function pauseAnim() { isPaused = !isPaused; if(!isPaused) requestAnimationFrame(animate); }
    function resumeAnim() { isPaused = false; if(!isPlaying) startPlay(); else requestAnimationFrame(animate); }
    function clearFrames() { frames = []; document.getElementById('fCount').innerText = "0"; clearDrawing(); stopAnim(); }

    init();
</script>
</body>
</html>
