<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>籃球戰術平台 Pro - 動態控制版</title>
    <style>
        :root { --accent: #3182ce; --bg: #000000; --panel: rgba(20, 20, 20, 0.95); --border: rgba(255,255,255,0.1); }
        body { margin: 0; padding: 0; background-color: var(--bg); overflow: hidden; height: 100vh; display: flex; font-family: -apple-system, sans-serif; color: white; }
        
        .stage { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; z-index: 1; background: #000; }
        .stage.ios-full-mode { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; }
        canvas { background-color: #111; touch-action: none; cursor: crosshair; z-index: 5; }

        /* 語音欄位 */
        .voice-bar { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; cursor: move; pointer-events: auto; 
            background: var(--panel); backdrop-filter: blur(10px); padding: 10px 15px; 
            border-radius: 12px; border: 1px solid var(--border); 
            display: flex; gap: 8px; align-items: center; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.5); width: 85%; max-width: 500px;
        }
        .voice-btn { background: #805ad5; border: none; border-radius: 8px; color: white; padding: 8px 12px; cursor: pointer; font-weight: bold; }
        input#v-output { flex: 1; background: #2d3748; border: none; color: #63b3ed; padding: 8px 12px; border-radius: 6px; outline: none; }

        /* 側邊欄 */
        .sidebar { position: absolute; top: 0; height: 100%; background: var(--panel); transition: 0.3s; z-index: 900; display: flex; flex-direction: column; }
        .sidebar-left { left: -260px; width: 260px; border-right: 1px solid var(--border); }
        .sidebar-left.active { left: 0; }
        .sidebar-right { right: -200px; width: 200px; border-left: 1px solid var(--border); padding: 20px 15px; box-sizing: border-box; gap: 12px; }
        .sidebar-right.active { right: 0; }
        .tab { position: absolute; width: 35px; height: 100px; display: flex; align-items: center; justify-content: center; writing-mode: vertical-lr; cursor: pointer; font-size: 12px; font-weight: bold; }
        .left-tab { right: -35px; top: 120px; background: #3182ce; border-radius: 0 8px 8px 0; }
        .right-tab { left: -35px; top: 120px; background: #38a169; border-radius: 8px 0 0 8px; }

        /* 下方播放控制列 */
        .play-controls {
            position: absolute; bottom: -80px; left: 50%; transform: translateX(-50%);
            z-index: 1100; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: var(--panel); backdrop-filter: blur(15px);
            padding: 12px 25px; border-radius: 20px; border: 1px solid var(--border);
            display: flex; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .play-controls.active { bottom: 30px; }
        
        .control-btn { border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.2s; }
        .control-btn:hover { transform: scale(1.1); }
        .btn-play { background: #38a169; color: white; }
        .btn-pause { background: #ecc94b; color: white; }
        .btn-stop { background: #e53e3e; color: white; }

        .panel-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; text-align: left; font-size: 14px; margin-bottom: 5px; }
        .btn-green { background: #38a169; } .btn-blue { background: #3182ce; } .btn-gray { background: #4a5568; } .btn-red { background: #e53e3e; } .btn-purple { background: #805ad5; }
        
        .tactic-list { flex: 1; overflow-y: auto; padding: 10px; }
        .tactic-item { background: rgba(255,255,255,0.03); border-radius: 6px; padding: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; cursor: pointer; font-size: 13px; }
    </style>
</head>
<body>

<div class="stage" id="mainStage">
    <div class="play-controls" id="playUI">
        <button class="control-btn btn-play" id="subPlay" onclick="resumeAnim()">▶</button>
        <button class="control-btn btn-pause" onclick="pauseAnim()">Ⅱ</button>
        <button class="control-btn btn-stop" onclick="stopAnim()">■</button>
    </div>

    <div class="voice-bar" id="dragVoice">
        <button class="voice-btn" id="v-toggle" onclick="toggleVoice()">🎤 說話</button>
        <input type="text" id="v-output" placeholder="拖曳或語音輸入..." readonly>
        <button class="btn-red" style="padding: 5px 10px; border-radius: 6px;" onclick="document.getElementById('v-output').value=''">✕</button>
    </div>

    <div class="sidebar sidebar-left" id="sidebarL">
        <div class="tab left-tab" onclick="toggleSidebar('L')">📁 戰術庫 ◀</div>
        <div style="padding: 20px 15px; border-bottom: 1px solid var(--border);">🏀 紀錄：<span id="saveCount">0</span> 點位</div>
        <div class="tactic-list" id="tacticList"></div>
    </div>

    <div class="sidebar sidebar-right" id="sidebarR">
        <div class="tab right-tab" onclick="toggleSidebar('R')">⚙️ 面板 ◀</div>
        <button class="panel-btn btn-green" onclick="record()">📌 紀錄點位</button>
        <button class="panel-btn btn-blue" onclick="startPlayProcess()">▶ 播放動畫</button>
        <button class="panel-btn btn-purple" onclick="saveTacticToStorage()">💾 儲存戰術</button>
        <hr style="width:100%; border: 0; border-top: 1px solid var(--border); margin: 10px 0;">
        <button class="panel-btn btn-gray" onclick="resetItems()">🔄 重置球員</button>
        <button class="panel-btn btn-red" onclick="clearFrames()">🗑️ 清空紀錄</button>
        <button class="panel-btn btn-gray" onclick="toggleFull()">📺 全螢幕切換</button>
    </div>

    <canvas id="court"></canvas>
</div>

<script>
    const canvas = document.getElementById('court');
    const ctx = canvas.getContext('2d');
    const BASE_W = 1000, BASE_H = 572; 
    let items = [], frames = [], playerImages = [], courtImage = null;
    
    // 播放狀態控制
    let isPlaying = false, isPaused = false, stopRequested = false;
    let currentFrameIdx = 0, currentT = 0;

    // --- 動畫核心控制 ---
    function startPlayProcess() {
        if(frames.length < 2) return alert("請先紀錄至少兩組點位");
        // 1. 隱藏右側面板
        document.getElementById('sidebarR').classList.remove('active');
        // 2. 顯示底部控制列
        document.getElementById('playUI').classList.add('active');
        // 3. 開始播放
        currentFrameIdx = 0; currentT = 0;
        stopRequested = false;
        resumeAnim();
    }

    function pauseAnim() { isPaused = true; isPlaying = false; }
    
    function resumeAnim() {
        if(isPlaying) return;
        isPlaying = true; isPaused = false;
        requestAnimationFrame(animLoop);
    }

    function stopAnim() {
        stopRequested = true;
        isPlaying = false; isPaused = false;
        document.getElementById('playUI').classList.remove('active');
        render(); // 回到當前物品位置
    }

    async function animLoop() {
        if(!isPlaying || stopRequested) return;

        render(currentT, frames[currentFrameIdx], frames[currentFrameIdx + 1]);
        
        currentT += 0.02; // 慢速步進

        if (currentT >= 1) {
            currentT = 0;
            currentFrameIdx++;
        }

        if (currentFrameIdx >= frames.length - 1) {
            // 播放結束
            stopAnim();
            return;
        }

        requestAnimationFrame(animLoop);
    }

    // --- 繪圖引擎 ---
    function render(t=null, sF=null, eF=null) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if(courtImage) ctx.drawImage(courtImage, 0, 0, canvas.width, canvas.height);
        const s = canvas.width / BASE_W;
        
        // 決定要渲染的點位數據
        let data;
        if (t !== null && sF && eF) {
            data = sF.map((it, i) => ({
                ...it, 
                x: it.x + (eF[i].x - it.x) * t, 
                y: it.y + (eF[i].y - it.y) * t
            }));
        } else {
            data = items;
        }

        data.forEach(p => {
            const r = (p.type==='ball' ? 18 : 34) * s;
            const px = p.x * s, py = p.y * s;
            ctx.save();
            ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2);
            if(p.type === 'ball') {
                ctx.fillStyle = "#ff5722"; ctx.fill(); ctx.strokeStyle = "white"; ctx.lineWidth = 2*s; ctx.stroke();
            } else {
                ctx.fillStyle = "white"; ctx.fill(); ctx.clip();
                if(p.img) ctx.drawImage(p.img, px - r, py - r, r * 2, r * 2);
                ctx.strokeStyle = "rgba(255,255,255,0.8)"; ctx.lineWidth = 2*s; ctx.stroke();
            }
            ctx.restore();
        });
    }

    // --- 初始化與拖曳邏輯 (與前版相容) ---
    async function init() {
        courtImage = await new Promise(res => {
            const img = new Image(); img.crossOrigin = "anonymous";
            img.src = "https://raw.githubusercontent.com/goodskyfly-cell/BBOARD/main/basketball%20court%202%20(NEW).png";
            img.onload = () => res(img);
        });
        const names = ["01.png", "05.png", "06.png", "07.png", "08.png", "09.png", "10.png", "12.png", "13.png", "15.png", "23.png", "89.png"];
        playerImages = await Promise.all(names.map(n => new Promise(res => {
            const img = new Image(); img.crossOrigin="anonymous";
            img.src = `https://raw.githubusercontent.com/goodskyfly-cell/newboard/main/${n}`;
            img.onload = () => res(img); img.onerror = () => res(null);
        })));
        resetItems();
        initDraggableVoice();
        initDrag();
        updateListUI();
        window.addEventListener('resize', resize);
        resize();
    }

    function initDrag() {
        const getP = (e) => {
            const r = canvas.getBoundingClientRect();
            const tx = e.touches ? e.touches[0].clientX : e.clientX;
            const ty = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (tx - r.left) / (canvas.width / BASE_W), y: (ty - r.top) / (canvas.width / BASE_W) };
        };
        canvas.addEventListener('mousedown', (e) => {
            if(isPlaying) return;
            const p = getP(e);
            dragTarget = items.slice().reverse().find(i => Math.hypot(i.x - p.x, i.y - p.y) < 40);
        });
        window.addEventListener('mousemove', (e) => {
            if(dragTarget && !isPlaying) {
                const p = getP(e);
                dragTarget.x = p.x; dragTarget.y = p.y;
                render();
            }
        });
        window.addEventListener('mouseup', () => dragTarget = null);
        canvas.addEventListener('touchstart', (e) => {
            if(isPlaying) return;
            const p = getP(e.touches[0]);
            dragTarget = items.slice().reverse().find(i => Math.hypot(i.x - p.x, i.y - p.y) < 40);
            if(dragTarget) e.preventDefault();
        }, {passive:false});
        window.addEventListener('touchmove', (e) => {
            if(dragTarget && !isPlaying) {
                e.preventDefault();
                const p = getP(e.touches[0]);
                dragTarget.x = p.x; dragTarget.y = p.y;
                render();
            }
        }, {passive:false});
        window.addEventListener('touchend', () => dragTarget = null);
    }

    // (功能函數保持不變)
    function record() { 
        if(isPlaying) return;
        frames.push(items.map(i => ({...i, imgSrc: i.img ? i.img.src.split('/').pop() : ''}))); 
        document.getElementById('saveCount').innerText = frames.length; 
    }
    function resetItems() {
        if(isPlaying) return;
        items = playerImages.filter(m => m).map((img, i) => ({ x: 80 + i * 75, y: 100, img, type: 'player' }));
        items.push({ x: 500, y: 286, type: 'ball' }); render();
    }
    function clearFrames() { frames = []; document.getElementById('saveCount').innerText = "0"; }
    function toggleSidebar(dir) { document.getElementById(dir === 'L' ? 'sidebarL' : 'sidebarR').classList.toggle('active'); }
    function toggleFull() {
        const stage = document.getElementById('mainStage');
        if (!document.fullscreenElement && !stage.classList.contains('ios-full-mode')) {
            if (stage.requestFullscreen) stage.requestFullscreen();
            else if (stage.webkitRequestFullscreen) stage.webkitRequestFullscreen();
            else stage.classList.add('ios-full-mode');
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            else stage.classList.remove('ios-full-mode');
        }
        setTimeout(resize, 100);
    }
    function resize() {
        const stage = document.getElementById('mainStage').getBoundingClientRect();
        const ratio = BASE_W / BASE_H;
        let w = stage.width, h = stage.height;
        if(w / h > ratio) w = h * ratio; else h = w / ratio;
        canvas.width = w; canvas.height = h;
        render();
    }

    // 儲存邏輯 (同前版)
    const STORAGE_KEY = 'bboard_v3_ctrl';
    function getTactics() { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    function updateListUI() {
        const list = document.getElementById('tacticList');
        const data = getTactics();
        list.innerHTML = Object.keys(data).length ? '' : '<div style="color:#555; text-align:center;">尚未儲存</div>';
        Object.keys(data).forEach(name => {
            const div = document.createElement('div');
            div.className = 'tactic-item';
            div.innerHTML = `<span>${name}</span><span style="color:#e53e3e">✕</span>`;
            div.onclick = (e) => { if(e.target.innerText === '✕') deleteTactic(name); else loadTactic(name); };
            list.appendChild(div);
        });
    }
    function saveTacticToStorage() {
        const name = prompt('戰術名稱：'); if(!name) return;
        const tactics = getTactics(); tactics[name] = { frames };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(tactics));
        updateListUI();
    }
    function loadTactic(name) {
        const tactics = getTactics(); frames = tactics[name].frames;
        items = frames[0].map(i => ({...i}));
        items.forEach(it => { if(it.type==='player') it.img = playerImages.find(p => p && p.src.includes(it.imgSrc)); });
        document.getElementById('saveCount').innerText = frames.length;
        render(); toggleSidebar('L');
    }
    function deleteTactic(name) { if(confirm('刪除？')) { const d = getTactics(); delete d[name]; localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); updateListUI(); } }

    function initDraggableVoice() {
        const bar = document.getElementById('dragVoice');
        let active = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;
        bar.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
            initialX = e.clientX - xOffset; initialY = e.clientY - yOffset; active = true;
        });
        window.addEventListener('mousemove', (e) => {
            if (active) {
                currentX = e.clientX - initialX; currentY = e.clientY - initialY;
                xOffset = currentX; yOffset = currentY;
                bar.style.transform = `translate(calc(-50% + ${currentX}px), ${currentY}px)`;
            }
        });
        window.addEventListener('mouseup', () => active = false);
    }
    
    // 語音初始化 (簡化)
    function initVoice() {
        const S = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!S) return; let rec = new S(); rec.lang = 'zh-TW'; rec.continuous = true;
        rec.onresult = (e) => { let r = ""; for (let i = e.resultIndex; i < e.results.length; i++) r += e.results[i][0].transcript; document.getElementById('v-output').value = r; };
        window.toggleVoice = () => { if(!isPlaying) rec.start(); };
    }

    init();
    initVoice();
</script>
</body>
</html>
