<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>籃球戰術平台 Pro - 空間極大化版</title>
    <style>
        /* 基礎佈局：極小化邊距以放大畫布 */
        body { margin: 0; padding: 5px; background-color: #1a202c; font-family: 'Microsoft JhengHei', sans-serif; color: white; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; overflow: hidden; }
        
        @media (orientation: portrait) {
            body::before { content: "🔄 請旋轉螢幕至橫向"; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a202c; display: flex; justify-content: center; align-items: center; z-index: 9999; font-size: 1.8rem; color: #f39c12; }
            .main-container, .voice-row { display: none !important; }
        }

        .main-container { display: flex; gap: 10px; flex: 1; min-height: 0; }

        /* 側邊戰術庫 */
        .sidebar { width: 160px; background: #2d3748; padding: 10px; border-radius: 8px; display: flex; flex-direction: column; }
        #tactic-list { flex: 1; overflow-y: auto; margin: 8px 0; border: 1px inset #4a5568; background: #1a202c; }
        .tactic-item { background: #4a5568; padding: 6px; margin-bottom: 4px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }

        /* 球場顯示區 */
        .board-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 0; }
        #step-info { color: #f6e05e; font-weight: bold; font-size: 1rem; margin-bottom: 4px; }
        canvas { background-color: #f39c12; border: 3px solid #5d3a1a; border-radius: 5px; max-height: 75vh; max-width: 100%; object-fit: contain; touch-action: none; }

        /* 控制按鈕區 */
        .control-row { margin-top: 8px; display: flex; gap: 8px; justify-content: center; }

        /* 整合語音列：文字與按鈕並排 */
        .voice-row { 
            display: flex; 
            align-items: center; 
            background: #2d3748; 
            padding: 8px 15px; 
            border-radius: 8px; 
            gap: 15px; 
            margin-top: 5px;
        }
        #transcript { 
            flex: 1; 
            font-size: 1.5rem; /* 字體加大 */
            font-weight: bold;
            color: #f6e05e; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
            background: #1a202c;
            padding: 5px 15px;
            border-radius: 5px;
            border: 1px solid #4a5568;
        }

        button { padding: 8px 16px; border-radius: 5px; font-weight: bold; cursor: pointer; border: none; font-size: 0.9rem; transition: 0.2s; white-space: nowrap; }
        .btn-save { background: #3182ce; color: white; width: 100%; }
        .btn-step { background: #d69e2e; color: white; }
        .btn-play { background: #38a169; color: white; }
        .btn-stop { background: #e53e3e; color: white; }
        .btn-reset { background: #718096; color: white; }
        .btn-full { background: #4a5568; color: white; }
        .btn-mic { background: #3182ce; color: white; }
        .btn-clear { background: #a0aec0; color: #1a202c; }
        button:disabled { opacity: 0.5; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="sidebar">
        <h3 style="margin:0; font-size:0.9rem;">📂 戰術庫</h3>
        <div id="tactic-list"></div>
        <button id="save-btn" class="btn-save">💾 儲存戰術</button>
    </div>

    <div class="board-container">
        <div id="step-info">已設定格數：0/20</div>
        <canvas id="courtCanvas" width="900" height="600"></canvas>
        <div class="control-row">
            <button id="next-step-btn" class="btn-step">📌 儲存此格 (上限20)</button>
            <button id="play-btn" class="btn-play">▶️ 播放</button>
            <button id="stop-btn" class="btn-stop">⏹️ 停止</button>
            <button id="reset-btn" class="btn-reset">🔄 重置</button>
            <button id="fullscreen-btn" class="btn-full">📺 全螢幕</button>
        </div>
    </div>
</div>

<div class="voice-row">
    <div id="transcript">語音輸入顯示處...</div>
    <button id="mic-btn" class="btn-mic">🎤 錄音</button>
    <button id="clear-btn" class="btn-clear">🗑️ 清除</button>
</div>

<script>
    const canvas = document.getElementById('courtCanvas');
    const ctx = canvas.getContext('2d');
    const scale = 30; 
    const imgNames = ["01.png", "05.png", "06.png", "07.png", "08.png", "09.png", "10.png", "12.png", "13.png", "15.png", "23.png", "89.png"];
    const imgUrls = imgNames.map(name => `https://raw.githubusercontent.com/goodskyfly-cell/newboard/main/${name}`);

    let items = [], dragTarget = null, images = [];
    let keyframes = []; 
    let isPlaying = false;
    let animeId = null;

    async function init() {
        images = await Promise.all(imgUrls.map(url => new Promise(res => {
            const img = new Image(); img.crossOrigin = "anonymous"; img.src = url;
            img.onload = () => res(img); img.onerror = () => res(null);
        })));
        fullReset();
        loadTacticList();
    }

    function fullReset() {
        stopAnimation();
        keyframes = [];
        items = [];
        images.forEach((img, i) => { if(img) items.push({ x: 55 + i * 72, y: 545, r: 24, img: img, type: 'player' }); });
        items.push({ x: 450, y: 250, r: 15, type: 'ball' });
        updateStepInfo();
        render();
    }

    function updateStepInfo() {
        // 修正 2：明確格數上限顯示
        document.getElementById('step-info').innerText = `已設定格數：${keyframes.length} / 20`;
        document.getElementById('next-step-btn').disabled = (keyframes.length >= 20);
    }

    function drawCourtLines() {
        ctx.strokeStyle = "white"; ctx.lineWidth = 2.5;
        const courtW = 28 * scale, courtH = 15 * scale;
        const offsetX = (canvas.width - courtW) / 2, offsetY = 50; 
        ctx.strokeRect(offsetX, offsetY, courtW, courtH);
        ctx.beginPath(); ctx.moveTo(canvas.width/2, offsetY); ctx.lineTo(canvas.width/2, offsetY + courtH); ctx.stroke();
        ctx.beginPath(); ctx.arc(canvas.width/2, offsetY + courtH/2, 1.8 * scale, 0, Math.PI*2); ctx.stroke();
        [true, false].forEach(isLeft => {
            const side = isLeft ? 1 : -1, baseLineX = isLeft ? offsetX : offsetX + courtW, centerY = offsetY + courtH/2;
            const hoopX = baseLineX + side * 1.575 * scale, r3 = 6.75 * scale, intersectY = (courtH/2) - 0.9 * scale, angle = Math.asin(intersectY / r3);
            ctx.beginPath(); ctx.moveTo(baseLineX, centerY - intersectY); ctx.lineTo(baseLineX + side * 1.575 * scale, centerY - intersectY);
            ctx.arc(hoopX, centerY, r3, isLeft ? -angle : Math.PI + angle, isLeft ? angle : Math.PI - angle, !isLeft);
            ctx.lineTo(baseLineX, centerY + intersectY); ctx.stroke();
            ctx.strokeRect(isLeft ? baseLineX : baseLineX - 5.8 * scale, centerY - 4.9 * scale / 2, 5.8 * scale, 4.9 * scale);
            ctx.beginPath(); ctx.arc(baseLineX + side * 5.8 * scale, centerY, 1.8 * scale, 0, Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.arc(hoopX, centerY, 7, 0, Math.PI*2); ctx.stroke();
        });
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawCourtLines();
        items.forEach(p => {
            ctx.save();
            if(p.type === 'ball') {
                ctx.translate(p.x, p.y);
                let grad = ctx.createRadialGradient(-p.r*0.3, -p.r*0.3, p.r*0.1, 0, 0, p.r);
                grad.addColorStop(0, '#f97316'); grad.addColorStop(1, '#7c2d12');
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fillStyle = "white"; ctx.fill(); ctx.clip(); 
                if(p.img) ctx.drawImage(p.img, p.x - p.r, p.y - p.r, p.r * 2, p.r * 2);
            }
            ctx.restore();
        });
    }

    document.getElementById('next-step-btn').onclick = () => {
        if(keyframes.length >= 20) return;
        keyframes.push(items.map(i => ({ x: i.x, y: i.y })));
        updateStepInfo();
    };

    function stopAnimation() {
        isPlaying = false;
        if(animeId) cancelAnimationFrame(animeId);
        document.getElementById('play-btn').disabled = false;
    }

    document.getElementById('stop-btn').onclick = stopAnimation;

    document.getElementById('play-btn').onclick = () => {
        if (keyframes.length < 2) return alert("請儲存格數後再播放！");
        isPlaying = true;
        document.getElementById('play-btn').disabled = true;
        let currentK = 0, progress = 0;
        function animate() {
            if (!isPlaying) return;
            const start = keyframes[currentK], end = keyframes[currentK + 1];
            items.forEach((item, idx) => {
                item.x = start[idx].x + (end[idx].x - start[idx].x) * progress;
                item.y = start[idx].y + (end[idx].y - start[idx].y) * progress;
            });
            render();
            progress += 0.02;
            if (progress >= 1) {
                progress = 0; currentK++;
                if (currentK >= keyframes.length - 1) { stopAnimation(); return; }
            }
            animeId = requestAnimationFrame(animate);
        }
        animate();
    };

    // 修正 3：恢復全螢幕功能
    document.getElementById('fullscreen-btn').onclick = () => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    };

    document.getElementById('save-btn').onclick = () => {
        const name = prompt("戰術名稱："); if (!name) return;
        let tactics = JSON.parse(localStorage.getItem('tactics_v2') || '[]');
        tactics.push({ name, keyframes, date: new Date().toLocaleString() });
        localStorage.setItem('tactics_v2', JSON.stringify(tactics));
        loadTacticList();
    };

    function loadTacticList() {
        const list = document.getElementById('tactic-list'); list.innerHTML = "";
        let tactics = JSON.parse(localStorage.getItem('tactics_v2') || '[]');
        tactics.forEach((t) => {
            const item = document.createElement('div'); item.className = 'tactic-item';
            item.innerText = t.name;
            item.onclick = () => { keyframes = t.keyframes; items.forEach((it, idx) => { it.x = keyframes[0][idx].x; it.y = keyframes[0][idx].y; }); updateStepInfo(); render(); };
            list.appendChild(item);
        });
    }

    // 座標觸控修正
    function getPos(e) {
        const r = canvas.getBoundingClientRect();
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: (cx - r.left) * (900 / r.width), y: (cy - r.top) * (600 / r.height) };
    }

    canvas.addEventListener('mousedown', e => {
        if(isPlaying) return;
        const p = getPos(e);
        for(let i = items.length - 1; i >= 0; i--) { if(Math.hypot(items[i].x - p.x, items[i].y - p.y) < items[i].r) { dragTarget = items[i]; break; } }
    });
    window.addEventListener('mousemove', e => { if(dragTarget) { const p = getPos(e); dragTarget.x = p.x; dragTarget.y = p.y; render(); } });
    window.addEventListener('mouseup', () => dragTarget = null);
    canvas.addEventListener('touchstart', e => {
        if(isPlaying) return;
        const p = getPos(e);
        for(let i = items.length - 1; i >= 0; i--) { if(Math.hypot(items[i].x - p.x, items[i].y - p.y) < items[i].r) { dragTarget = items[i]; e.preventDefault(); break; } }
    }, {passive: false});
    window.addEventListener('touchmove', e => { if(dragTarget) { const p = getPos(e); dragTarget.x = p.x; dragTarget.y = p.y; render(); e.preventDefault(); } }, {passive: false});

    // 語音功能
    const micBtn = document.getElementById('mic-btn');
    const transcriptDiv = document.getElementById('transcript');
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        const rec = new SpeechRecognition();
        rec.lang = 'zh-TW'; rec.interimResults = true; rec.continuous = true;
        let micOn = false;
        micBtn.onclick = () => {
            if(!micOn) { rec.start(); micBtn.innerText = "🛑 停止"; micOn = true; }
            else { rec.stop(); micBtn.innerText = "🎤 錄音"; micOn = false; }
        };
        rec.onresult = (e) => {
            let t = ""; for(let i=e.resultIndex; i<e.results.length; i++) { t += e.results[i][0].transcript; }
            transcriptDiv.innerText = t;
        };
    }
    document.getElementById('clear-btn').onclick = () => transcriptDiv.innerText = "語音輸入顯示處...";
    document.getElementById('reset-btn').onclick = fullReset;
    init();
</script>
</body>
</html>
