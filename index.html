<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>籃球戰術平台 Pro - 平板滿版修復版</title>
    <style>
        /* 基礎設定：強制不出現滾動條，並填滿畫面 */
        body { 
            margin: 0; 
            padding: 10px; 
            background-color: #1a202c; 
            font-family: 'Microsoft JhengHei', sans-serif; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; 
            box-sizing: border-box;
            overflow: hidden; 
        }

        /* 直立提醒保持不變 */
        @media (orientation: portrait) {
            body::before { content: "🔄 請將螢幕旋轉至橫向\n以獲得最佳戰術體驗"; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a202c; display: flex; justify-content: center; align-items: center; z-index: 9999; font-size: 1.8rem; color: #f39c12; text-align: center; white-space: pre-wrap; padding: 20px; }
            .main-container, .voice-container, .info { display: none !important; }
        }

        .info { text-align: center; margin-bottom: 8px; }
        .info h2 { margin: 5px 0; font-size: 1.2rem; }

        /* 主要區塊：使用 flex-grow 讓它自動佔滿剩餘空間 */
        .main-container { 
            display: flex; 
            gap: 15px; 
            flex: 1; 
            width: 100%; 
            max-width: 1280px; 
            overflow: hidden; 
            align-items: stretch;
        }

        /* 側邊欄：高度改為自動彈性 */
        .sidebar { 
            width: 180px; 
            background: #2d3748; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #4a5568; 
            display: flex; 
            flex-direction: column; 
        }
        #tactic-list { flex: 1; overflow-y: auto; margin: 10px 0; border: 1px inset #4a5568; background: #1a202c; }
        .tactic-item { background: #4a5568; padding: 8px; margin-bottom: 5px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }

        /* 畫布容器：這是關鍵，設定最大高度避免推擠 */
        .board-container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
        }
        
        canvas { 
            background-color: #f39c12; 
            border: 4px solid #5d3a1a; 
            border-radius: 5px; 
            max-height: 65vh; /* 限制畫布高度，給按鈕留位子 */
            max-width: 100%; 
            object-fit: contain; 
            touch-action: none; 
        }

        .animation-controls { 
            margin-top: 10px; 
            display: flex; 
            gap: 8px; 
            justify-content: center; 
            flex-wrap: nowrap; 
        }

        /* 語音區：縮小體積 */
        .voice-container { 
            width: 100%; 
            max-width: 1150px; 
            background: #2d3748; 
            padding: 10px 15px; 
            border-radius: 8px; 
            margin-top: 10px; 
        }
        #transcript { 
            background: #1a202c; 
            padding: 10px; 
            border-radius: 5px; 
            min-height: 40px; 
            color: #edf2f7; 
            font-size: 1.2rem; 
            border: 1px inset #4a5568; 
            margin-bottom: 8px; 
        }

        button { padding: 8px 16px; border-radius: 5px; font-weight: bold; cursor: pointer; border: none; font-size: 0.9rem; }
        #save-btn { background: #3182ce; color: white; margin-top: auto; }
        #record-btn { background: #e53e3e; color: white; }
        #record-btn.recording { background: #9b2c2c; }
        #play-btn { background: #38a169; color: white; }
        #reset-btn { background: #edf2f7; color: #2d3748; }
        #fullscreen-btn { background: #4a5568; color: white; }
    </style>
</head>
<body>

<div class="info">
    <h2>🏀 籃球戰術平台 Pro</h2>
</div>

<div class="main-container">
    <div class="sidebar">
        <h3 style="margin:0; font-size:1rem;">📂 戰術庫</h3>
        <div id="tactic-list"></div>
        <button id="save-btn">💾 儲存戰術</button>
    </div>
    <div class="board-container">
        <canvas id="courtCanvas" width="900" height="600"></canvas>
        <div class="animation-controls">
            <button id="record-btn">🔴 錄製</button>
            <button id="play-btn">▶️ 播放</button>
            <button id="reset-btn">🔄 重置</button>
            <button id="fullscreen-btn">📺 全螢幕</button>
        </div>
    </div>
</div>

<div class="voice-container">
    <div id="transcript">等待語音輸入...</div>
    <div style="display:flex; gap:10px; justify-content:center;">
        <button id="mic-btn" style="background:#3182ce; color:white;">🎤 語音記錄</button>
        <button id="clear-btn" style="background:#718096; color:white;">🗑️ 清除</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('courtCanvas');
    const ctx = canvas.getContext('2d');
    const scale = 30; 
    const imgNames = ["01.png", "05.png", "06.png", "07.png", "08.png", "09.png", "10.png", "12.png", "13.png", "15.png", "23.png", "89.png"];
    const imgUrls = imgNames.map(name => `https://raw.githubusercontent.com/goodskyfly-cell/newboard/main/${name}`);

    let items = [], dragTarget = null, images = [], animationFrames = [], isRecording = false, recordTimer;

    async function init() {
        images = await Promise.all(imgUrls.map(url => new Promise(res => {
            const img = new Image(); img.crossOrigin = "anonymous"; img.src = url;
            img.onload = () => res(img); img.onerror = () => res(null);
        })));
        resetItems();
        loadTacticList();
        setInterval(render, 1000); // 每一秒強制重刷一次確保穩定
    }

    function resetItems() {
        items = [];
        images.forEach((img, i) => { if(img) items.push({ x: 55 + i * 72, y: 545, r: 24, img: img, type: 'player' }); });
        items.push({ x: 450, y: 250, r: 15, type: 'ball' });
        render();
    }

    function drawCourtLines() {
        ctx.strokeStyle = "white"; ctx.lineWidth = 2.5;
        const courtW = 28 * scale, courtH = 15 * scale;
        const offsetX = (canvas.width - courtW) / 2, offsetY = 50; 
        ctx.strokeRect(offsetX, offsetY, courtW, courtH);
        ctx.beginPath(); ctx.moveTo(canvas.width/2, offsetY); ctx.lineTo(canvas.width/2, offsetY + courtH); ctx.stroke();
        ctx.beginPath(); ctx.arc(canvas.width/2, offsetY + courtH/2, 1.8 * scale, 0, Math.PI*2); ctx.stroke();
        [true, false].forEach(isLeft => {
            const side = isLeft ? 1 : -1, baseLineX = isLeft ? offsetX : offsetX + courtW, centerY = offsetY + courtH/2;
            const hoopX = baseLineX + side * 1.575 * scale, r3 = 6.75 * scale, intersectY = (courtH/2) - 0.9 * scale, angle = Math.asin(intersectY / r3);
            ctx.beginPath(); ctx.moveTo(baseLineX, centerY - intersectY); ctx.lineTo(baseLineX + side * 1.575 * scale, centerY - intersectY);
            ctx.arc(hoopX, centerY, r3, isLeft ? -angle : Math.PI + angle, isLeft ? angle : Math.PI - angle, !isLeft);
            ctx.lineTo(baseLineX, centerY + intersectY); ctx.stroke();
            ctx.strokeRect(isLeft ? baseLineX : baseLineX - 5.8 * scale, centerY - 4.9 * scale / 2, 5.8 * scale, 4.9 * scale);
            ctx.beginPath(); ctx.arc(baseLineX + side * 5.8 * scale, centerY, 1.8 * scale, 0, Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.arc(hoopX, centerY, 7, 0, Math.PI*2); ctx.stroke();
        });
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawCourtLines();
        items.forEach(p => {
            ctx.save();
            if(p.type === 'ball') {
                ctx.translate(p.x, p.y);
                let grad = ctx.createRadialGradient(-p.r*0.3, -p.r*0.3, p.r*0.1, 0, 0, p.r);
                grad.addColorStop(0, '#f97316'); grad.addColorStop(1, '#7c2d12');
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fillStyle = "white"; ctx.fill(); ctx.clip(); 
                if(p.img) ctx.drawImage(p.img, p.x - p.r, p.y - p.r, p.r * 2, p.r * 2);
            }
            ctx.restore();
        });
    }

    // 動畫與錄製邏輯
    document.getElementById('record-btn').onclick = function() {
        if (!isRecording) {
            animationFrames = []; isRecording = true; this.innerText = "⏹️ 停止"; this.classList.add('recording');
            recordTimer = setInterval(() => { animationFrames.push(items.map(i => ({x: i.x, y: i.y}))); }, 50);
        } else {
            isRecording = false; clearInterval(recordTimer); this.innerText = "🔴 錄製"; this.classList.remove('recording');
        }
    };

    document.getElementById('play-btn').onclick = () => {
        let i = 0; const playTimer = setInterval(() => {
            if (i >= animationFrames.length) return clearInterval(playTimer);
            animationFrames[i].forEach((pos, idx) => { items[idx].x = pos.x; items[idx].y = pos.y; });
            render(); i++;
        }, 50);
    };

    document.getElementById('save-btn').onclick = () => {
        const name = prompt("戰術名稱："); if (!name) return;
        let tactics = JSON.parse(localStorage.getItem('tactics') || '[]');
        tactics.push({ name, frames: animationFrames, date: new Date().toLocaleString() });
        localStorage.setItem('tactics', JSON.stringify(tactics)); loadTacticList();
    };

    function loadTacticList() {
        const list = document.getElementById('tactic-list'); list.innerHTML = "";
        let tactics = JSON.parse(localStorage.getItem('tactics') || '[]');
        tactics.forEach((t) => {
            const item = document.createElement('div'); item.className = 'tactic-item';
            item.innerText = t.name; item.onclick = () => { animationFrames = t.frames; render(); };
            list.appendChild(item);
        });
    }

    document.getElementById('fullscreen-btn').onclick = () => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    };

    // 觸控位置修正
    function getPos(e) {
        const r = canvas.getBoundingClientRect();
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        const scaleX = canvas.width / r.width;
        const scaleY = canvas.height / r.height;
        return { x: (cx - r.left) * scaleX, y: (cy - r.top) * scaleY };
    }

    canvas.addEventListener('mousedown', e => {
        const p = getPos(e);
        for(let i = items.length - 1; i >= 0; i--) {
            if(Math.hypot(items[i].x - p.x, items[i].y - p.y) < items[i].r) { dragTarget = items[i]; break; }
        }
    });
    window.addEventListener('mousemove', e => { if(dragTarget) { const p = getPos(e); dragTarget.x = p.x; dragTarget.y = p.y; render(); } });
    window.addEventListener('mouseup', () => dragTarget = null);
    canvas.addEventListener('touchstart', e => {
        const p = getPos(e);
        for(let i = items.length - 1; i >= 0; i--) {
            if(Math.hypot(items[i].x - p.x, items[i].y - p.y) < items[i].r) { dragTarget = items[i]; e.preventDefault(); break; }
        }
    }, {passive: false});
    window.addEventListener('touchmove', e => { if(dragTarget) { const p = getPos(e); dragTarget.x = p.x; dragTarget.y = p.y; render(); e.preventDefault(); } }, {passive: false});
    window.addEventListener('touchend', () => dragTarget = null);

    document.getElementById('reset-btn').onclick = resetItems;
    init();
</script>
</body>
</html>
