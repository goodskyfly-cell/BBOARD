<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>籃球戰術平台 Pro - 全螢幕 UI 修正版</title>
    <style>
        body { margin: 0; padding: 0; background-color: #1a202c; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #step-count { color: #f6e05e; font-weight: bold; margin-bottom: 5px; }
        canvas { background-color: #f39c12; border: 3px solid #5d3a1a; touch-action: none; max-width: 98%; max-height: 80vh; }
        canvas:fullscreen { width: 100vw; height: 100vh; border: none; }
        .controls { margin: 10px 0; display: flex; gap: 8px; }
        button { padding: 12px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-full { background: #4a5568; color: white; }
        .btn-action { background: #38a169; color: white; }
    </style>
</head>
<body>

<div class="content">
    <div id="step-count">已儲存點位：0/20</div>
    <canvas id="courtCanvas" width="900" height="650"></canvas>
    <div class="controls">
        <button id="full-btn" class="btn-full">📺 全螢幕模式</button>
        <button id="reset-btn" style="background:#718096; color:white;">🔄 重置球員</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('courtCanvas');
    const ctx = canvas.getContext('2d');
    
    // 原始設計座標系
    const BASE_W = 900;
    const BASE_H = 650; // 增加下方 UI 空間
    const COURT_H = 600; // 球場實際高度
    const PLAYER_R = 22;

    const imgNames = ["01.png", "05.png", "06.png", "07.png", "08.png", "09.png", "10.png", "12.png", "13.png", "15.png", "23.png", "89.png"];
    const imgUrls = imgNames.map(name => `https://raw.githubusercontent.com/goodskyfly-cell/newboard/main/${name}`);

    let items = [], images = [], dragTarget = null;

    async function init() {
        images = await Promise.all(imgUrls.map(url => new Promise(res => {
            const img = new Image(); img.crossOrigin = "anonymous"; img.src = url;
            img.onload = () => res(img); img.onerror = () => res(null);
        })));
        resetItems();
        render();
    }

    function resetItems() {
        items = [];
        // 將球員初始排列在「下方邊線」位置 (y 座標約在 625 處)
        images.forEach((img, i) => {
            if(img) items.push({ x: 50 + i * 70, y: 625, img: img, type: 'player' });
        });
        items.push({ x: 450, y: 300, type: 'ball' });
        render();
    }

    function drawCourt(scale, ox, oy) {
        ctx.strokeStyle = "white";
        ctx.lineWidth = 3 * scale;
        const cw = 28 * 30 * scale, ch = 15 * 30 * scale;
        
        // 繪製球場底色 (在全螢幕時確保背景一致)
        ctx.fillStyle = "#f39c12";
        ctx.fillRect(ox, oy, cw, ch);
        ctx.strokeRect(ox, oy, cw, ch);

        // 中線與中圈
        ctx.beginPath();
        ctx.moveTo(ox + cw/2, oy); ctx.lineTo(ox + cw/2, oy + ch);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(ox + cw/2, oy + ch/2, 1.8 * 30 * scale, 0, Math.PI*2);
        ctx.stroke();

        // 三分線與禁區
        [0, 1].forEach(side => {
            const x = side === 0 ? ox : ox + cw;
            const dir = side === 0 ? 1 : -1;
            ctx.beginPath();
            ctx.arc(x + dir * 1.575 * 30 * scale, oy + ch/2, 6.75 * 30 * scale, (side === 0 ? -1.2 : 1.9), (side === 0 ? 1.2 : 4.4));
            ctx.stroke();
            ctx.strokeRect(side === 0 ? ox : ox + cw - 5.8*30*scale, oy + ch/2 - 2.45*30*scale, 5.8*30*scale, 4.9*30*scale);
        });
    }

    function render() {
        const w = canvas.width, h = canvas.height;
        ctx.clearRect(0, 0, w, h);

        const scale = Math.min(w / BASE_W, h / (BASE_H));
        const ox = (w - BASE_W * scale) / 2;
        const oy = (h - BASE_H * scale) / 2;

        drawCourt(scale, ox, oy);

        // 繪製球員與球
        items.forEach(p => {
            const dx = p.x * scale + ox;
            const dy = p.y * scale + oy;
            const r = PLAYER_R * scale;

            ctx.save();
            if(p.type === 'ball') {
                ctx.beginPath(); ctx.arc(dx, dy, r*0.7, 0, Math.PI*2);
                ctx.fillStyle = "#ff4500"; ctx.fill(); ctx.stroke();
            } else {
                ctx.beginPath(); ctx.arc(dx, dy, r, 0, Math.PI*2);
                ctx.fillStyle = "white"; ctx.fill(); ctx.clip();
                if(p.img) ctx.drawImage(p.img, dx - r, dy - r, r * 2, r * 2);
                ctx.restore();
                ctx.strokeStyle = "#333"; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.arc(dx, dy, r, 0, Math.PI*2); ctx.stroke();
            }
            ctx.restore();
        });
    }

    function getPos(e) {
        const r = canvas.getBoundingClientRect();
        const tx = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
        const ty = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
        
        const scale = Math.min(canvas.width / BASE_W, canvas.height / BASE_H);
        const ox = (canvas.width - BASE_W * scale) / 2;
        const oy = (canvas.height - BASE_H * scale) / 2;

        return { x: (tx - ox) / scale, y: (ty - oy) / scale };
    }

    // 事件監聽
    const start = e => {
        const p = getPos(e);
        for(let i = items.length - 1; i >= 0; i--) {
            if(Math.hypot(items[i].x - p.x, items[i].y - p.y) < PLAYER_R + 5) {
                dragTarget = items[i];
                if(e.touches) e.preventDefault();
                break;
            }
        }
    };

    const move = e => {
        if(dragTarget) {
            const p = getPos(e);
            dragTarget.x = p.x; dragTarget.y = p.y;
            render();
            if(e.touches) e.preventDefault();
        }
    };

    canvas.addEventListener('mousedown', start);
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', () => dragTarget = null);
    canvas.addEventListener('touchstart', start, {passive:false});
    window.addEventListener('touchmove', move, {passive:false});
    window.addEventListener('touchend', () => dragTarget = null);

    document.getElementById('full-btn').onclick = () => {
        if (!document.fullscreenElement) canvas.requestFullscreen();
        else document.exitFullscreen();
    };

    document.getElementById('reset-btn').onclick = resetItems;

    window.addEventListener('resize', () => {
        if(document.fullscreenElement) {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        } else {
            canvas.width = BASE_W;
            canvas.height = BASE_H;
        }
        render();
    });

    document.addEventListener('fullscreenchange', () => window.dispatchEvent(new Event('resize')));

    init();
</script>
</body>
</html>
